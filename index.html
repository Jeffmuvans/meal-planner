async function dbLoad() {
  if (!db) return null;
  try {
    const { data, error } = await db.from('app_state').select('key,value');
    if (error) throw error;
    return Object.fromEntries((data||[]).map(r => [r.key, r.value]));
  } catch(e) { console.error('Load error:', e); return null; }
}
async function dbSave(key, value) {
  if (!db) return;
  try {
    await db.from('app_state').upsert({ key, value, updated_at: new Date().toISOString() });
  } catch(e) { console.error('Save error:', e); }
}

function slotLabel(entry,recipes,foods){
  if(entry.type==='food'){const f=foods.find(x=>x.id===entry.foodId);return f?`${f.name} (${entry.amount}${entry.unit})`:'?';}
  const rec=recipes.find(r=>r.id===entry.rId);if(!rec)return '?';
  return entry.qty&&entry.qty!==1?`${rec.name} ×${r1(entry.qty)}`:rec.name;
}

// ── FoodAmountPicker ──────────────────────────────────────────────────────────
function FoodAmountPicker({food,T,onConfirm,onBack}){
  const [amount,setAmount]=useState(food.serving);
  const n=useMemo(()=>{if(!amount)return{cal:0,prot:0,carbs:0,fat:0,fiber:0};const r=amount/food.serving;return{cal:food.cal*r,prot:food.prot*r,carbs:food.carbs*r,fat:food.fat*r,fiber:food.fiber*r};},[amount,food]);
  return <div style={{padding:'14px 20px',background:T.surface}}>
    <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:2}}>{food.name}</div>
    <div style={{fontSize:11,color:T.text2,marginBottom:16}}>¿Cuánto vas a consumir?</div>
    <div style={{marginBottom:16}}>
      <div style={{fontSize:10,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.4px',marginBottom:10}}>Cantidad ({food.unit})</div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <button onClick={()=>setAmount(a=>Math.max(0,a-food.serving))} style={{width:38,height:38,borderRadius:8,border:`1px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
        <div style={{flex:1,position:'relative'}}>
          <input type="number" min="0" value={amount} onChange={e=>setAmount(+e.target.value||0)} style={{width:'100%',padding:'10px 40px 10px 10px',fontSize:16,fontWeight:700,textAlign:'center',border:`1px solid ${T.border2}`,borderRadius:7,background:T.surface2,color:T.text,outline:'none',fontFamily:'inherit'}}/>
          <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:11,color:T.text2,pointerEvents:'none'}}>{food.unit}</span>
        </div>
        <button onClick={()=>setAmount(a=>a+food.serving)} style={{width:38,height:38,borderRadius:8,border:`1px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
      </div>
    </div>
    {amount>0&&<div style={{background:T.surface2,borderRadius:8,padding:'10px 12px',marginBottom:14,border:`1px solid ${T.border}`}}><div style={{fontSize:9,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.4px',marginBottom:7}}>Nutrición</div><NutrBar n={n} compact/></div>}
    <div style={{display:'flex',gap:7}}><GhostBtn onClick={onBack} T={T} style={{flex:1}}>← Volver</GhostBtn><PrimaryBtn onClick={()=>amount>0&&onConfirm({foodId:food.id,amount,unit:food.unit})} T={T} disabled={!amount} style={{flex:2}}>Confirmar</PrimaryBtn></div>
  </div>;
}

  const getMissR=rec=>rec.ingredients.filter(({foodId,amount})=>(pantry.find(p=>p.foodId===foodId)?.amount||0)<amount).length;
  const recList=recipes.filter(r=>r.name.toLowerCase().includes(q.toLowerCase()));

    {step==='qtyR'&&<QtyPicker recipe={selRec} foods={foods} T={T} onConfirm={qty=>{addToSlot(slotKey,{type:'recipe',rId:selRec.id,qty});close();}} onBack={()=>setSelRec(null)}/>}
    {step==='qtyF'&&<FoodAmountPicker food={selFood} T={T} onConfirm={e=>{addToSlot(slotKey,{type:'food',...e});close();}} onBack={()=>setSelFood(null)}/>}

      </div>
      <div style={{padding:'12px 18px'}}>

        <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:300,overflowY:'auto'}}>
          {listTab==='recetas'&&recList.map(rec=>{const n=calcN(rec.ingredients,foods);const miss=getMissR(rec);const rmc=T.meal[rec.mealType]||T.meal.Almuerzo;
            return<div key={rec.id} onClick={()=>setSelRec(rec)} style={{display:'flex',alignItems:'center',gap:9,padding:'9px 11px',borderRadius:8,border:`1px solid ${T.border}`,background:T.surface,cursor:'pointer'}} onMouseOver={e=>e.currentTarget.style.borderColor=T.accent} onMouseOut={e=>e.currentTarget.style.borderColor=T.border}>
              <div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:5,marginBottom:2}}><span style={{fontSize:12,fontWeight:700,color:T.text}}>{rec.name}</span><span style={{fontSize:9,background:rmc.bg,color:rmc.tc,padding:'0 5px',borderRadius:7,border:`1px solid ${rmc.bc}`}}>{rec.mealType}</span></div><div style={{fontSize:10,color:T.text2}}>{r0(n.cal/rec.servings)} kcal · {r1(n.prot/rec.servings)}g prot</div></div>
              {miss>0&&<span style={{fontSize:9,background:'#FEF3C7',color:'#92400E',padding:'1px 5px',borderRadius:7,border:'1px solid #F59E0B',flexShrink:0}}>⚠{miss}</span>}

            </div>;})}
          {listTab==='alimentos'&&foodList.map(food=><div key={food.id} onClick={()=>setSelFood(food)} style={{display:'flex',alignItems:'center',gap:9,padding:'9px 11px',borderRadius:8,border:`1px solid ${T.border}`,background:T.surface,cursor:'pointer'}} onMouseOver={e=>e.currentTarget.style.borderColor=T.accent} onMouseOut={e=>e.currentTarget.style.borderColor=T.border}>
            <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:T.text,marginBottom:2}}>{food.name}</div><div style={{fontSize:10,color:T.text2}}>{food.serving}{food.unit} · {food.cal} kcal · {food.prot}g prot</div></div>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={T.text3} strokeWidth="2"><polyline points="9,18 15,12 9,6"/></svg>
          </div>)}

// ── DetailModal ───────────────────────────────────────────────────────────────
function DetailModal({recipe,foods,pantry,T,close,setModal}){
  const FALLBACK={Desayuno:{bg:'#FFFBEB',bc:'#F59E0B',tc:'#78350F'},Almuerzo:{bg:'#F0FDF4',bc:'#22C55E',tc:'#14532D'},Cena:{bg:'#EFF6FF',bc:'#3B82F6',tc:'#1E3A8A'}};

  const missing=recipe.ingredients.map(({foodId,amount,unit})=>{const f=foods.find(x=>x.id===foodId);const have=pantry.find(p=>p.foodId===foodId)?.amount||0;if(have<amount)return{f,needed:amount,have,unit};return null;}).filter(Boolean);
  return <>
    <div style={{padding:'14px 18px 12px',borderBottom:`1px solid ${ts.border}`,display:'flex',alignItems:'flex-start',gap:8,background:ts.surface}}>

      <CloseBtn onClick={close} T={ts}/>
    </div>
    <div style={{padding:'14px 18px',background:ts.surface}}>
      <div style={{fontSize:12,color:ts.text2,marginBottom:12}}>⏱ {recipe.prepTime} min · 👥 {recipe.servings} porción{recipe.servings>1?'es':''}</div>
      {missing.length>0&&<div style={{background:'#FEF3C7',border:'1px solid #F59E0B',borderRadius:6,padding:'8px 10px',marginBottom:10,fontSize:11,color:'#92400E'}}><div style={{fontWeight:700,marginBottom:3}}>⚠ Faltantes:</div>{missing.map(({f,needed,have,unit})=><div key={f.id}>• {f.name}: necesitas {needed}{unit}, tienes {have}</div>)}</div>}
      <div style={{marginBottom:12}}><div style={{fontSize:9,fontWeight:700,color:ts.text2,textTransform:'uppercase',letterSpacing:'.4px',marginBottom:7}}>Nutrición por porción</div><NutrBar n={n} servings={recipe.servings}/></div>
      <div style={{marginBottom:12}}><div style={{fontSize:9,fontWeight:700,color:ts.text2,textTransform:'uppercase',letterSpacing:'.4px',marginBottom:7}}>Ingredientes</div>
        {recipe.ingredients.map(({foodId,amount,unit})=>{const f=foods.find(x=>x.id===foodId);const ok=(pantry.find(p=>p.foodId===foodId)?.amount||0)>=amount;return f?<div key={foodId} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:`1px solid ${ts.border}`,fontSize:11,color:ts.text}}><span>{f.name}</span><div style={{display:'flex',gap:6,alignItems:'center'}}><span style={{color:ts.text2}}>{amount} {unit}</span><span style={{fontSize:9,background:ok?'#DCFCE7':'#FEF3C7',color:ok?'#14532D':'#92400E',padding:'1px 5px',borderRadius:8}}>{ok?'✓':'⚠'}</span></div></div>:null;})}
      </div>
      {recipe.instructions&&<div style={{marginBottom:14}}><div style={{fontSize:9,fontWeight:700,color:ts.text2,textTransform:'uppercase',letterSpacing:'.4px',marginBottom:7}}>Preparación</div><div style={{fontSize:12,lineHeight:1.8,whiteSpace:'pre-line',color:ts.text}}>{recipe.instructions}</div></div>}
      {T&&<PrimaryBtn onClick={()=>setModal({type:'planRecipe',recipe})} T={T} style={{width:'100%',justifyContent:'center'}}>+ Añadir al planificador</PrimaryBtn>}
    </div>
  </>;
}

  const undoItem=item=>{setPantry(p=>{const ex=p.find(x=>x.foodId===item.foodId);if(!ex)return p;const n=+(ex.amount-item.missing).toFixed(1);if(n<=0)return p.filter(x=>x.foodId!==item.foodId);return p.map(x=>x.foodId===item.foodId?{...x,amount:n}:x);});setShopChk(c=>({...c,[item.foodId]:false}));};

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [appReady,setAppReady]=useState(!IS_CONFIGURED);
  const [syncStatus,setSyncStatus]=useState('idle'); // idle | saving | saved | error
  const [tab,setTab]=useState('planner');
  const [person,setPerson]=useState('jeff');
  const [weekOff,setWeekOff]=useState(0);
  const [foods,setFoods]=useState(FOODS0);
  const [recipes,setRecipes]=useState(RECIPES0);
  const [pantry,setPantry]=useState([]);
  const [planners,setPlanners]=useState({jeff:{},lia:{}});
  const [modal,setModal]=useState(null);
  const [shopChk,setShopChk]=useState({});
  const T=THEMES[person];
  const dates=useMemo(()=>weekDates(weekOff),[weekOff]);
  const saveTimer=useRef(null);
  const isFirstLoad=useRef(true);

  // Load from Supabase on mount
  useEffect(()=>{
    if(!IS_CONFIGURED)return;
    setSyncStatus('saving');
    dbLoad().then(data=>{
      if(data){
        if(data.foods)setFoods(data.foods);
        if(data.recipes)setRecipes(data.recipes);
        if(data.pantry)setPantry(data.pantry);
        if(data.planners)setPlanners(data.planners);
        if(data.shopChk)setShopChk(data.shopChk);
      }
      setAppReady(true);
      setSyncStatus('saved');
      setTimeout(()=>setSyncStatus('idle'),2000);
    }).catch(()=>{setAppReady(true);setSyncStatus('error');});
  },[]);

  // Auto-save when state changes (debounced 1.2s)
  useEffect(()=>{
    if(!IS_CONFIGURED||!appReady)return;
    if(isFirstLoad.current){isFirstLoad.current=false;return;}
    if(saveTimer.current)clearTimeout(saveTimer.current);
    setSyncStatus('saving');
    saveTimer.current=setTimeout(async()=>{
      try{
        await Promise.all([
          dbSave('foods',foods),dbSave('recipes',recipes),
          dbSave('pantry',pantry),dbSave('planners',planners),
          dbSave('shopChk',shopChk),
        ]);
        setSyncStatus('saved');
        setTimeout(()=>setSyncStatus('idle'),2500);
      }catch{setSyncStatus('error');}
    },1200);
  },[foods,recipes,pantry,planners,shopChk]);

  // Poll for remote changes every 45s (for multi-device sync)
  useEffect(()=>{
    if(!IS_CONFIGURED)return;
    const interval=setInterval(async()=>{
      const data=await dbLoad();
      if(!data)return;
      if(data.planners)setPlanners(data.planners);
      if(data.pantry)setPantry(data.pantry);
      if(data.shopChk)setShopChk(data.shopChk);
    },45000);
    return()=>clearInterval(interval);
  },[]);

  const addToSlot=(key,entry)=>setPlanners(p=>({...p,[person]:{...p[person],[key]:[...(p[person][key]||[]),entry]}}));
  const rmFromSlot=(key,i)=>setPlanners(p=>{const a=[...(p[person][key]||[])];a.splice(i,1);return{...p,[person]:{...p[person],[key]:a}};});

  const shopList=useMemo(()=>{
    const needed={};const forPerson={};
    ['jeff','lia'].forEach(pid=>{
      Object.values(planners[pid]||{}).forEach(entries=>(entries||[]).forEach(entry=>{
        if(entry.type==='food'){
          const f=foods.find(x=>x.id===entry.foodId);if(!f)return;
          needed[entry.foodId]=(needed[entry.foodId]||0)+entry.amount;
          if(!forPerson[entry.foodId])forPerson[entry.foodId]=new Set();forPerson[entry.foodId].add(pid);
        }else{
          const rec=recipes.find(r=>r.id===entry.rId);if(!rec)return;
          rec.ingredients.forEach(({foodId,amount})=>{
            needed[foodId]=(needed[foodId]||0)+(amount/rec.servings)*(entry.qty||1);
            if(!forPerson[foodId])forPerson[foodId]=new Set();forPerson[foodId].add(pid);
          });
        }
      }));
    });
    return Object.entries(needed).map(([fId,amt])=>{const f=foods.find(x=>x.id===fId);if(!f)return null;const have=pantry.find(p=>p.foodId===fId)?.amount||0;const missing=r1(Math.max(0,amt-have));if(missing<=0)return null;return{foodId:fId,food:f,needed:r1(amt),have,missing,forPersons:[...(forPerson[fId]||[])]};}).filter(Boolean);
  },[planners,pantry,recipes,foods]);

  const TABS=[{id:'planner',icon:'📅',label:'Planificador'},{id:'recipes',icon:'📖',label:'Recetas'},{id:'foods',icon:'🥦',label:'Alimentos'},{id:'pantry',icon:'🏠',label:'Alacena'},{id:'shop',icon:'🛒',label:'Compras',badge:shopList.length}];

  if(!appReady)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f5f5f0',flexDirection:'column',gap:16}}>
    <div style={{width:36,height:36,border:'3px solid #e0e0e0',borderTop:'3px solid #1a3d0b',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
    <div style={{fontSize:13,color:'#666'}}>Cargando datos…</div>
  </div>;

  const syncDot={idle:null,saving:<span style={{fontSize:10,color:'#666',display:'flex',alignItems:'center',gap:4,flexShrink:0}}><span style={{width:6,height:6,borderRadius:'50%',border:'1.5px solid #ccc',borderTop:'1.5px solid #666',display:'inline-block',animation:'spin .7s linear infinite'}}/>Guardando</span>,saved:<span style={{fontSize:10,color:'#22c55e',display:'flex',alignItems:'center',gap:4,flexShrink:0}}>✓ Guardado</span>,error:<span style={{fontSize:10,color:'#ef4444',flexShrink:0}}>⚠ Error al guardar</span>}[syncStatus];

  return <div style={{minHeight:'100vh',background:tab==='planner'?T.bg:'#f5f5f0',transition:'background .3s',fontFamily:"'Space Grotesk',sans-serif",fontSize:13}}>
    <div style={{maxWidth:1100,margin:'0 auto'}}>
      <div style={{background:'#fff',borderBottom:'1px solid #e0e0e0',position:'sticky',top:0,zIndex:40,padding:'0 16px'}}>
        <div style={{display:'flex',alignItems:'center',overflowX:'auto'}}>
          <div style={{fontSize:15,fontWeight:800,color:'#1a3d0b',padding:'12px 14px 12px 0',flexShrink:0}}>🥗 Meal Planner</div>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',alignItems:'center',gap:5,padding:'14px 10px',border:'none',borderBottom:tab===t.id?'2px solid #1a3d0b':'2px solid transparent',background:'none',cursor:'pointer',fontSize:12,fontWeight:600,color:tab===t.id?'#1a3d0b':'#666',whiteSpace:'nowrap'}}>
            {t.icon} {t.label}{t.badge>0&&<span style={{background:'#DC2626',color:'#fff',fontSize:9,fontWeight:700,borderRadius:10,padding:'1px 5px'}}>{t.badge}</span>}
          </button>)}
          <div style={{marginLeft:'auto',padding:'0 4px',flexShrink:0}}>{syncDot}</div>
        </div>
      </div>

      {tab==='planner'&&<div style={{background:T.bg,minHeight:'calc(100vh - 50px)',transition:'background .3s'}}>
        <div style={{padding:'10px 16px',borderBottom:`1px solid ${T.border}`,display:'flex',gap:8,alignItems:'center',background:T.surface,fontFamily:T.font}}>
          <span style={{fontSize:10,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.4px'}}>Planificador de</span>
          {['jeff','lia'].map(pid=>{const th=THEMES[pid];const active=person===pid;return<button key={pid} onClick={()=>setPerson(pid)} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 14px',borderRadius:20,border:`1.5px solid ${active?th.accent:T.border2}`,background:active?th.accentDark:'transparent',color:active?th.accentText:T.text2,cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:th.font,transition:'all .15s'}}>
            {th.emoji} {th.name}
          </button>;})}
        </div>
        <PlannerTab dates={dates} weekOff={weekOff} setWeekOff={setWeekOff} planner={planners[person]} addToSlot={addToSlot} rmFromSlot={rmFromSlot} recipes={recipes} foods={foods} T={T} setModal={setModal}/>
      </div>}
      {tab==='recipes'&&<RecipesTab recipes={recipes} setRecipes={setRecipes} foods={foods} pantry={pantry} setModal={setModal}/>}
      {tab==='foods'&&<FoodsTab foods={foods} setFoods={setFoods}/>}
      {tab==='pantry'&&<PantryTab pantry={pantry} setPantry={setPantry} foods={foods}/>}
      {tab==='shop'&&<ShopTab shopList={shopList} shopChk={shopChk} setShopChk={setShopChk} setPantry={setPantry}/>}
    </div>

    {modal&&<div onClick={()=>setModal(null)} style={{position:'fixed',inset:0,zIndex:50,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'48px 14px 16px',overflowY:'auto'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:tab==='planner'?T.surface:'#fff',borderRadius:14,border:`1px solid ${tab==='planner'?T.border:'#e0e0e0'}`,boxShadow:'0 24px 64px rgba(0,0,0,.22)',width:'100%',maxWidth:500,maxHeight:'86vh',overflowY:'auto',fontFamily:tab==='planner'?T.font:"'Space Grotesk',sans-serif"}}>
        {modal.type==='detail'&&<DetailModal recipe={modal.recipe} foods={foods} pantry={pantry} T={tab==='planner'?T:null} close={()=>setModal(null)} setModal={setModal}/>}
        {modal.type==='addSlot'&&<AddSlotModal date={modal.date} meal={modal.meal} recipes={recipes} foods={foods} pantry={pantry} addToSlot={addToSlot} T={T} close={()=>setModal(null)}/>}
        {modal.type==='planRecipe'&&<PlanRecipeModal recipe={modal.recipe} dates={dates} addToSlot={addToSlot} foods={foods} T={T} close={()=>setModal(null)}/>}
        {modal.type==='recipeForm'&&<RecipeFormModal recipe={modal.recipe} foods={foods} onSave={modal.onSave} close={()=>setModal(null)}/>}
      </div>
    </div>}
  </div>;
}

// Entry point — show setup screen if not configured
function Root(){
  return IS_CONFIGURED ? <App/> : <SetupScreen/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
