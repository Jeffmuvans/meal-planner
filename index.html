<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;overflow-x:hidden;}
body{font-family:'Space Grotesk',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px;height:100%;overscroll-behavior:none;}
input,select,textarea{font-family:inherit;font-size:16px!important;} /* 16px prevents iOS zoom */
button{-webkit-appearance:none;appearance:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}

/* Safe areas */
:root{
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --safe-l:   env(safe-area-inset-left, 0px);
  --safe-r:   env(safe-area-inset-right, 0px);
  --nav-h: 64px;
  --header-h: 52px;
}

/* Bottom nav safe area */
.bottom-nav{
  padding-bottom: calc(var(--safe-bot) + 6px);
  height: calc(var(--nav-h) + var(--safe-bot));
}

/* Main scroll area */
.main-scroll{
  padding-top: var(--header-h);
  padding-bottom: calc(var(--nav-h) + var(--safe-bot) + 16px);
  min-height: 100vh;
}

/* Bottom sheet animation */
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}

.sheet-enter{animation:slideUp .28s cubic-bezier(.32,.72,0,1) forwards;}
.fade-enter{animation:fadeIn .2s ease forwards;}
.pop-enter{animation:popIn .2s cubic-bezier(.32,.72,0,1) forwards;}

/* Touch feedback */
.tap-highlight:active{opacity:.7;transform:scale(.97);}
.tap-highlight{transition:opacity .1s,transform .1s;}

/* Responsive breakpoint */
@media(min-width:768px){
  .mobile-only{display:none!important;}
  .desktop-only{display:flex!important;}
  .bottom-nav{display:none!important;}
  .main-scroll{padding-top:var(--header-h);padding-bottom:16px;}
  .top-nav{display:flex!important;}
}
@media(max-width:767px){
  .desktop-only{display:none!important;}
  .top-nav{display:none!important;}
  .mobile-only{display:flex!important;}
}
</style>

function calcN(ingrs,foods,qty=1){return ingrs.reduce((a,{foodId,amount})=>{const f=foods.find(x=>x.id===foodId);if(!f||!amount)return a;const r=(amount/f.serving)*qty;return{cal:a.cal+f.cal*r,prot:a.prot+f.prot*r,carbs:a.carbs+f.carbs*r,fat:a.fat+f.fat*r,fiber:a.fiber+f.fiber*r};},{cal:0,prot:0,carbs:0,fat:0,fiber:0});}

// ── Shared primitives ─────────────────────────────────────────────────────────
function NutrBar({n,servings=1,compact}){
  const items=[{l:'Kcal',v:r0(n.cal/servings),c:'#92400E',bg:'#FEF3C7'},{l:'Prot',v:r1(n.prot/servings)+'g',c:'#14532D',bg:'#DCFCE7'},{l:'Carbs',v:r1(n.carbs/servings)+'g',c:'#1E3A8A',bg:'#EFF6FF'},{l:'Grasa',v:r1(n.fat/servings)+'g',c:'#581C87',bg:'#F5F3FF'},{l:'Fibra',v:r1(n.fiber/servings)+'g',c:'#7C2D12',bg:'#FFF7ED'}];
  return <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:4}}>{items.map(it=><div key={it.l} style={{textAlign:'center',padding:compact?'5px 2px':'8px 2px',borderRadius:8,background:it.bg}}><div style={{fontSize:compact?12:15,fontWeight:700,color:it.c}}>{it.v}</div><div style={{fontSize:10,color:it.c,opacity:.7,marginTop:1}}>{it.l}</div></div>)}</div>;
}

  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
</button>;}
function PrimaryBtn({children,onClick,T,disabled,style={},full}){return <button onClick={onClick} disabled={disabled} className="tap-highlight" style={{padding:'13px 20px',borderRadius:12,border:'none',background:T?T.primaryBg:'#1a3d0b',color:T?T.primaryColor:'#fff',cursor:disabled?'not-allowed':'pointer',fontSize:14,fontWeight:700,opacity:disabled?.45:1,width:full?'100%':undefined,display:'flex',alignItems:'center',justifyContent:'center',gap:6,...style}}>{children}</button>;}
function GhostBtn({children,onClick,T,style={}}){return <button onClick={onClick} className="tap-highlight" style={{padding:'13px 20px',borderRadius:12,border:`1.5px solid ${T?T.border2:'#ccc'}`,background:'transparent',color:T?T.text:'#1a1a1a',cursor:'pointer',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:6,...style}}>{children}</button>;}

  return <button onClick={onClick} className="tap-highlight" style={{padding:'8px 12px',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:600,display:'inline-flex',alignItems:'center',gap:4,...(s[v]||s.ghost),...style}}>{children}</button>;
}

function slotLabel(entry,recipes,foods){
  if(entry.type==='food'){const f=foods.find(x=>x.id===entry.foodId);return f?`${f.name} (${entry.amount}${entry.unit})`:'?';}
  const rec=recipes.find(r=>r.id===entry.rId);if(!rec)return '?';
  return entry.qty&&entry.qty!==1?`${rec.name} ×${r1(entry.qty)}`:rec.name;
}

function Sheet({open,onClose,children,T,title,subtitle,maxH='90vh'}){
  const isMobile=useIsMobile();

      <div onClick={e=>e.stopPropagation()} style={{background:T?T.surface:'#fff',borderRadius:16,border:`1px solid ${T?T.border:'#e0e0e0'}`,boxShadow:'0 24px 64px rgba(0,0,0,.2)',width:'100%',maxWidth:500,maxHeight:'85vh',overflowY:'auto',fontFamily:T?T.font:"'Space Grotesk',sans-serif"}} className="pop-enter">

        {/* Handle */}

// ── QtyPicker ─────────────────────────────────────────────────────────────────
function QtyPicker({recipe,foods,T,onConfirm,onBack}){
  const [mode,setMode]=useState('porciones');
  const [qty,setQty]=useState(1);
  const [exactAmt,setExactAmt]=useState('');
  const [exactUnit,setExactUnit]=useState('g');
  const rw=recipeWeight(recipe);
  const clamp=v=>Math.max(0.5,Math.round(v*2)/2);
  const effQty=mode==='porciones'?qty:(rw>0&&+exactAmt>0?(+exactAmt/rw)*recipe.servings:1);
  const baseN=calcN(recipe.ingredients,foods,1);
  const confirm=()=>{if(mode==='porciones')onConfirm(qty);else if(rw>0&&+exactAmt>0)onConfirm(r1((+exactAmt/rw)*recipe.servings));else onConfirm(1);};
  return <div style={{padding:'16px 20px 8px',background:T.surface}}>
    <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:2}}>{recipe.name}</div>
    <div style={{fontSize:13,color:T.text2,marginBottom:16}}>Define la cantidad a registrar</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:20}}>
      {[['porciones','Por porciones'],['exacto','En g / ml']].map(([m,lbl])=><button key={m} onClick={()=>setMode(m)} style={{padding:'11px',borderRadius:10,border:`1.5px solid ${mode===m?T.accent:T.border}`,background:mode===m?T.accentDark:T.surface2,color:mode===m?T.accentText:T.text2,cursor:'pointer',fontSize:13,fontWeight:700}}>{lbl}</button>)}
    </div>
    {mode==='porciones'?<div style={{marginBottom:20}}>
      <div style={{fontSize:11,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:14}}>Porciones — base: {recipe.servings}</div>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <button onClick={()=>setQty(q=>clamp(q-.5))} style={{width:52,height:52,borderRadius:14,border:`1.5px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',fontSize:24,fontWeight:300,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>−</button>
        <div style={{flex:1,textAlign:'center'}}><div style={{fontSize:40,fontWeight:800,color:T.accent,lineHeight:1}}>{qty}</div><div style={{fontSize:13,color:T.text2,marginTop:4}}>porción{qty!==1?'es':''}</div></div>
        <button onClick={()=>setQty(q=>q+.5)} style={{width:52,height:52,borderRadius:14,border:`1.5px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',fontSize:24,fontWeight:300,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>+</button>
      </div>
    </div>:<div style={{marginBottom:20}}>
      {rw===0&&<div style={{background:'#FEF3C7',border:'1px solid #F59E0B',borderRadius:8,padding:'10px 12px',marginBottom:12,fontSize:13,color:'#92400E'}}>⚠ Sin ingredientes en g/ml. Usa porciones.</div>}
      <div style={{fontSize:11,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Peso total receta: {rw>0?rw+' g/ml':'no disponible'}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 90px',gap:10,marginBottom:10}}>
        <input type="number" inputMode="decimal" min="0" value={exactAmt} onChange={e=>setExactAmt(e.target.value)} placeholder={rw>0?String(r0(rw/recipe.servings)):'0'} style={{padding:'14px',fontSize:20,fontWeight:700,border:`1.5px solid ${T.border2}`,borderRadius:10,background:T.surface2,color:T.text,outline:'none',fontFamily:'inherit'}}/>
        <select value={exactUnit} onChange={e=>setExactUnit(e.target.value)} style={{padding:'14px',fontSize:16,border:`1.5px solid ${T.border2}`,borderRadius:10,background:T.surface2,color:T.text,outline:'none',fontFamily:'inherit'}}>
          <option value="g">g</option><option value="ml">ml</option>
        </select>
      </div>
      {+exactAmt>0&&rw>0&&<div style={{fontSize:13,color:T.text2}}>≈ {r1((+exactAmt/rw)*recipe.servings)} porciones</div>}
    </div>}
    <div style={{background:T.surface2,borderRadius:12,padding:'12px',marginBottom:16,border:`1px solid ${T.border}`}}>
      <div style={{fontSize:10,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>Nutrición total</div>
      <NutrBar n={baseN} servings={1/Math.max(0.01,effQty)} compact/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:10,paddingBottom:8}}>
      <GhostBtn onClick={onBack} T={T}>← Volver</GhostBtn>
      <PrimaryBtn onClick={confirm} T={T}>Confirmar</PrimaryBtn>
    </div>
  </div>;
}

// ── FoodAmountPicker ──────────────────────────────────────────────────────────
function FoodAmountPicker({food,T,onConfirm,onBack}){
  const [amount,setAmount]=useState(food.serving);
  const n=useMemo(()=>{if(!amount)return{cal:0,prot:0,carbs:0,fat:0,fiber:0};const r=amount/food.serving;return{cal:food.cal*r,prot:food.prot*r,carbs:food.carbs*r,fat:food.fat*r,fiber:food.fiber*r};},[amount,food]);
  return <div style={{padding:'16px 20px 8px',background:T.surface}}>
    <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:2}}>{food.name}</div>
    <div style={{fontSize:13,color:T.text2,marginBottom:20}}>¿Cuánto vas a consumir?</div>
    <div style={{fontSize:11,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:14}}>Cantidad ({food.unit})</div>
    <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20}}>
      <button onClick={()=>setAmount(a=>Math.max(0,a-food.serving))} style={{width:52,height:52,borderRadius:14,border:`1.5px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',fontSize:24,fontWeight:300,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>−</button>
      <div style={{flex:1,position:'relative'}}>
        <input type="number" inputMode="decimal" min="0" value={amount} onChange={e=>setAmount(+e.target.value||0)} style={{width:'100%',padding:'14px 50px 14px 16px',fontSize:20,fontWeight:700,textAlign:'center',border:`1.5px solid ${T.border2}`,borderRadius:10,background:T.surface2,color:T.text,outline:'none',fontFamily:'inherit'}}/>
        <span style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',fontSize:13,color:T.text2,pointerEvents:'none'}}>{food.unit}</span>
      </div>
      <button onClick={()=>setAmount(a=>a+food.serving)} style={{width:52,height:52,borderRadius:14,border:`1.5px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',fontSize:24,fontWeight:300,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>+</button>
    </div>
    {amount>0&&<div style={{background:T.surface2,borderRadius:12,padding:'12px',marginBottom:16,border:`1px solid ${T.border}`}}>
      <div style={{fontSize:10,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>Nutrición</div>
      <NutrBar n={n} compact/>
    </div>}
    <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:10,paddingBottom:8}}>
      <GhostBtn onClick={onBack} T={T}>← Volver</GhostBtn>
      <PrimaryBtn onClick={()=>amount>0&&onConfirm({foodId:food.id,amount,unit:food.unit})} T={T} disabled={!amount}>Confirmar</PrimaryBtn>
    </div>
  </div>;
}

// ── AddSlot Sheet ─────────────────────────────────────────────────────────────
function AddSlotSheet({date,meal,recipes,foods,pantry,addToSlot,T,close}){
  const [listTab,setListTab]=useState('recetas');const [q,setQ]=useState('');const [selRec,setSelRec]=useState(null);const [selFood,setSelFood]=useState(null);
  const mc=T.meal[meal];
  const getMissR=rec=>rec.ingredients.filter(({foodId,amount})=>(pantry.find(p=>p.foodId===foodId)?.amount||0)<amount).length;
  const recList=recipes.filter(r=>r.name.toLowerCase().includes(q.toLowerCase()));
  const foodList=foods.filter(f=>f.name.toLowerCase().includes(q.toLowerCase()));
  const slotKey=`${dKey(date)}_${meal}`;
  const step=selRec?'qtyR':selFood?'qtyF':'list';
  const fmt=d=>d.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});
  return <Sheet open onClose={close} T={T}
    title={step==='list'?'Añadir al planificador':'Cantidad'}

    maxH="92vh">
    {step==='qtyR'&&<QtyPicker recipe={selRec} foods={foods} T={T} onConfirm={qty=>{addToSlot(slotKey,{type:'recipe',rId:selRec.id,qty});close();}} onBack={()=>setSelRec(null)}/>}
    {step==='qtyF'&&<FoodAmountPicker food={selFood} T={T} onConfirm={e=>{addToSlot(slotKey,{type:'food',...e});close();}} onBack={()=>setSelFood(null)}/>}
    {step==='list'&&<div>
      <div style={{display:'flex',borderBottom:`1px solid ${T.border}`,paddingLeft:4}}>
        {[['recetas','📖 Recetas'],['alimentos','🥦 Alimentos']].map(([id,lbl])=><button key={id} onClick={()=>{setListTab(id);setQ('');}} style={{flex:1,padding:'14px 8px',border:'none',borderBottom:listTab===id?`2.5px solid ${T.accent}`:'2.5px solid transparent',background:'none',cursor:'pointer',fontSize:13,fontWeight:700,color:listTab===id?T.accent:T.text2}}>{lbl}</button>)}
      </div>
      <div style={{padding:'14px 16px 0'}}>
        <div style={{position:'relative',marginBottom:12}}>
          <svg style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',color:T.text2}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input autoFocus style={{width:'100%',padding:'12px 12px 12px 40px',fontSize:15,border:`1.5px solid ${T.border2}`,borderRadius:12,background:T.surface2,color:T.text,outline:'none',fontFamily:'inherit'}} placeholder={`Buscar ${listTab}...`} value={q} onChange={e=>setQ(e.target.value)}/>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {listTab==='recetas'&&recList.map(rec=>{const n=calcN(rec.ingredients,foods);const miss=getMissR(rec);const rmc=T.meal[rec.mealType]||T.meal.Almuerzo;
            return<button key={rec.id} onClick={()=>setSelRec(rec)} className="tap-highlight" style={{display:'flex',alignItems:'center',gap:12,padding:'14px',borderRadius:12,border:`1.5px solid ${T.border}`,background:T.surface,cursor:'pointer',textAlign:'left',width:'100%'}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4}}>
                  <span style={{fontSize:14,fontWeight:700,color:T.text}}>{rec.name}</span>
                  <span style={{fontSize:10,background:rmc.bg,color:rmc.tc,padding:'2px 6px',borderRadius:6,border:`1px solid ${rmc.bc}`,fontWeight:700,flexShrink:0}}>{rec.mealType}</span>
                </div>
                <div style={{fontSize:12,color:T.text2}}>{r0(n.cal/rec.servings)} kcal · {r1(n.prot/rec.servings)}g prot · {rec.prepTime}min</div>
              </div>
              {miss>0&&<span style={{fontSize:10,background:'#FEF3C7',color:'#92400E',padding:'3px 7px',borderRadius:8,border:'1px solid #F59E0B',flexShrink:0}}>⚠ {miss}</span>}
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.text3} strokeWidth="2"><polyline points="9,18 15,12 9,6"/></svg>
            </button>;})}
          {listTab==='alimentos'&&foodList.map(food=><button key={food.id} onClick={()=>setSelFood(food)} className="tap-highlight" style={{display:'flex',alignItems:'center',gap:12,padding:'14px',borderRadius:12,border:`1.5px solid ${T.border}`,background:T.surface,cursor:'pointer',textAlign:'left',width:'100%'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:3}}>{food.name}</div>
              <div style={{fontSize:12,color:T.text2}}>{food.serving}{food.unit} · {food.cal} kcal · {food.prot}g prot</div>
            </div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.text3} strokeWidth="2"><polyline points="9,18 15,12 9,6"/></svg>
          </button>)}
          {((listTab==='recetas'&&recList.length===0)||(listTab==='alimentos'&&foodList.length===0))&&<div style={{textAlign:'center',padding:'30px 20px',color:T.text2,fontSize:14}}>Sin resultados.</div>}
          <div style={{height:8}}/>
        </div>
      </div>
    </div>}
  </Sheet>;
}

// ── PlanRecipeSheet ───────────────────────────────────────────────────────────

    {step===1?<div style={{padding:'16px 20px 8px'}}>
      <LF t="Día" T={T}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
          {dates.map((d,i)=>{const sel=selD&&dKey(selD)===dKey(d);const today=isToday(d);return<button key={i} onClick={()=>setSelD(d)} className="tap-highlight" style={{padding:'8px 2px',borderRadius:10,border:`1.5px solid ${sel?T.accent:today?T.accent:T.border}`,background:sel?T.accentDark:today?T.surface2:T.surface2,color:sel?T.accentText:T.text,cursor:'pointer',textAlign:'center'}}>
            <div style={{fontSize:9,color:sel?T.accentText:T.text2,marginBottom:2}}>{DAYS_SHORT[i]}</div>

        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {MEALS.map(m=>{const mc=T.meal[m];const act=selM===m;return<button key={m} onClick={()=>setSelM(m)} className="tap-highlight" style={{padding:'14px 16px',borderRadius:12,border:`1.5px solid ${act?mc.bc:T.border}`,background:act?mc.bg:T.surface2,color:act?mc.tc:T.text,cursor:'pointer',fontSize:14,fontWeight:act?700:500,display:'flex',alignItems:'center',gap:10,textAlign:'left'}}>
            <span style={{fontSize:18}}>{MEAL_ICONS[m]}</span>{m}
            {act&&<svg style={{marginLeft:'auto'}} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20,6 9,17 4,12"/></svg>}

// ── Detail Sheet ──────────────────────────────────────────────────────────────
function DetailSheet({recipe,foods,pantry,T,close,setModal}){
  const FALLBACK={Desayuno:{bg:'#FFFBEB',bc:'#F59E0B',tc:'#78350F'},Almuerzo:{bg:'#F0FDF4',bc:'#22C55E',tc:'#14532D'},Cena:{bg:'#EFF6FF',bc:'#3B82F6',tc:'#1E3A8A'}};
  const mc=(T?T.meal:FALLBACK)[recipe.mealType]||FALLBACK.Almuerzo;
  const n=calcN(recipe.ingredients,foods);
  const ts=T||{surface:'#fff',text:'#1a1a1a',text2:'#666',border:'#e0e0e0',surface2:'#f5f5f0'};
  const missing=recipe.ingredients.map(({foodId,amount,unit})=>{const f=foods.find(x=>x.id===foodId);const have=pantry.find(p=>p.foodId===foodId)?.amount||0;if(have<amount)return{f,needed:amount,have,unit};return null;}).filter(Boolean);
  return <Sheet open onClose={close} T={T} maxH="95vh">
    <div style={{padding:'8px 20px 16px',background:ts.surface}}>
      <span style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,background:mc.bg,color:mc.tc,border:`1px solid ${mc.bc}`,display:'inline-block',marginBottom:10}}>{MEAL_ICONS[recipe.mealType]} {recipe.mealType}</span>
      <div style={{fontSize:20,fontWeight:800,color:ts.text,lineHeight:1.2,marginBottom:4}}>{recipe.name}</div>
      <div style={{fontSize:14,color:ts.text2,marginBottom:16}}>{recipe.desc}</div>
      <div style={{display:'flex',gap:16,marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:ts.text2}}><span>⏱</span><span>{recipe.prepTime} min</span></div>
        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:ts.text2}}><span>👥</span><span>{recipe.servings} porción{recipe.servings>1?'es':''}</span></div>
      </div>
      {missing.length>0&&<div style={{background:'#FEF3C7',border:'1px solid #F59E0B',borderRadius:10,padding:'12px 14px',marginBottom:16,fontSize:13,color:'#92400E'}}>
        <div style={{fontWeight:700,marginBottom:4}}>⚠ Faltantes en alacena:</div>
        {missing.map(({f,needed,have,unit})=><div key={f.id} style={{marginTop:2}}>• {f.name}: necesitas {needed}{unit}, tienes {have}</div>)}
      </div>}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:ts.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Nutrición por porción</div>
        <NutrBar n={n} servings={recipe.servings}/>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:ts.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Ingredientes</div>
        {recipe.ingredients.map(({foodId,amount,unit})=>{const f=foods.find(x=>x.id===foodId);const ok=(pantry.find(p=>p.foodId===foodId)?.amount||0)>=amount;return f?<div key={foodId} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${ts.border}`}}>
          <span style={{fontSize:14,color:ts.text}}>{f.name}</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:13,color:ts.text2}}>{amount} {unit}</span>
            <span style={{fontSize:11,background:ok?'#DCFCE7':'#FEF3C7',color:ok?'#14532D':'#92400E',padding:'2px 8px',borderRadius:8,fontWeight:700}}>{ok?'✓':'⚠'}</span>
          </div>
        </div>:null;})}
      </div>
      {recipe.instructions&&<div style={{marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,color:ts.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Preparación</div>
        <div style={{fontSize:14,lineHeight:1.8,whiteSpace:'pre-line',color:ts.text}}>{recipe.instructions}</div>
      </div>}
      {T&&<PrimaryBtn onClick={()=>{close();setModal({type:'planRecipe',recipe});}} T={T} full>+ Añadir al planificador</PrimaryBtn>}
      <div style={{height:8}}/>
    </div>
  </Sheet>;
}

// ── Mobile Planner Tab ────────────────────────────────────────────────────────
function MobilePlannerTab({dates,weekOff,setWeekOff,planner,addToSlot,rmFromSlot,recipes,foods,T,setModal}){
  const today=new Date();const todayIdx=Math.max(0,dates.findIndex(d=>d.toDateString()===today.toDateString()));
  const [dayIdx,setDayIdx]=useState(todayIdx>=0?todayIdx:0);
  const date=dates[dayIdx];
  const fmt=d=>d.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});

  // Swipe gesture
  const touchStart=useRef(null);
  const onTouchStart=e=>touchStart.current=e.touches[0].clientX;
  const onTouchEnd=e=>{
    if(touchStart.current===null)return;
    const dx=e.changedTouches[0].clientX-touchStart.current;
    if(Math.abs(dx)>50){if(dx<0)setDayIdx(i=>Math.min(6,i+1));else setDayIdx(i=>Math.max(0,i-1));}
    touchStart.current=null;
  };

  return <div style={{background:T.bg,minHeight:'100%',fontFamily:T.font}}>
    {/* Week strip */}
    <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:'12px 16px 10px',position:'sticky',top:52,zIndex:10}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
        <button onClick={()=>{setWeekOff(w=>w-1);setDayIdx(0);}} style={{width:36,height:36,borderRadius:10,border:`1px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15,18 9,12 15,6"/></svg>
        </button>
        <span style={{flex:1,textAlign:'center',fontSize:13,fontWeight:700,color:T.text}}>{weekOff===0?'Esta semana':weekOff>0?`+${weekOff} semana`:weekOff+' semana'}</span>
        <button onClick={()=>{setWeekOff(w=>w+1);setDayIdx(0);}} style={{width:36,height:36,borderRadius:10,border:`1px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9,18 15,12 9,6"/></svg>
        </button>
        {weekOff!==0&&<button onClick={()=>{setWeekOff(0);setDayIdx(todayIdx>=0?todayIdx:0);}} style={{height:36,padding:'0 12px',borderRadius:10,border:`1px solid ${T.accent}`,background:'transparent',color:T.accent,cursor:'pointer',fontSize:12,fontWeight:700}}>Hoy</button>}
      </div>
      {/* Day pills */}
      <div style={{display:'flex',gap:4,overflowX:'auto',paddingBottom:2}}>
        {dates.map((d,i)=>{const active=i===dayIdx;const tod=isToday(d);const key=`${dKey(d)}_`;const hasAny=MEALS.some(m=>(planner[key+m]||[]).length>0);
          return<button key={i} onClick={()=>setDayIdx(i)} className="tap-highlight" style={{flexShrink:0,width:42,padding:'7px 0',borderRadius:12,border:`1.5px solid ${active?T.accent:tod?T.border2:T.border}`,background:active?T.accentDark:T.surface2,color:active?T.accentText:T.text,cursor:'pointer',textAlign:'center',position:'relative'}}>
            <div style={{fontSize:9,color:active?T.accentText:T.text2,marginBottom:2}}>{DAYS_SHORT[i]}</div>
            <div style={{fontSize:15,fontWeight:700}}>{d.getDate()}</div>
            {hasAny&&<div style={{width:5,height:5,borderRadius:'50%',background:active?T.accentText:T.accent,margin:'2px auto 0'}}/>}
          </button>;})}
      </div>
    </div>

    {/* Day view with swipe */}
    <div style={{padding:'0 0 8px'}} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <div style={{padding:'14px 16px 6px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:16,fontWeight:700,color:T.text,textTransform:'capitalize'}}>{fmt(date)}</div>
        {isToday(date)&&<span style={{fontSize:11,fontWeight:700,background:T.accentDark,color:T.accentText,padding:'3px 10px',borderRadius:8}}>Hoy</span>}
      </div>

      {MEALS.map(meal=>{
        const mc=T.meal[meal];const key=`${dKey(date)}_${meal}`;const slot=planner[key]||[];
        return<div key={meal} style={{margin:'8px 16px',borderRadius:16,border:`1.5px solid ${T.border}`,overflow:'hidden',background:T.surface}}>
          {/* Meal header */}
          <div style={{padding:'12px 16px',background:mc.bg,borderBottom:`1px solid ${mc.bc}33`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:18}}>{MEAL_ICONS[meal]}</span>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:mc.tc}}>{meal}</div>
                {slot.length>0&&<div style={{fontSize:11,color:mc.tc,opacity:.8}}>{slot.length} ítem{slot.length>1?'s':''}</div>}
              </div>
            </div>
            <button onClick={()=>setModal({type:'addSlot',date,meal})} className="tap-highlight" style={{width:36,height:36,borderRadius:10,background:mc.bc+'33',border:`1px solid ${mc.bc}`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:mc.tc}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
          {/* Slot entries */}
          {slot.length===0?<div style={{padding:'20px 16px',textAlign:'center',color:T.text3,fontSize:13}}>Toca + para añadir</div>:
          <div style={{padding:'8px'}}>
            {slot.map((entry,ri)=>{
              const label=slotLabel(entry,recipes,foods);const clickable=entry.type==='recipe';
              const entryN=entry.type==='food'?
                (()=>{const f=foods.find(x=>x.id===entry.foodId);if(!f)return null;const r=entry.amount/f.serving;return{cal:r0(f.cal*r)}; })():
                (()=>{const rec=recipes.find(r=>r.id===entry.rId);if(!rec)return null;return{cal:r0(calcN(rec.ingredients,foods,entry.qty||1).cal)};})();
              return<div key={ri} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,background:T.surface2,border:`1px solid ${T.border}`,marginBottom:6}}>
                <div style={{flex:1,cursor:clickable?'pointer':'default'}} onClick={()=>{if(clickable){const rec=recipes.find(r=>r.id===entry.rId);if(rec)setModal({type:'detail',recipe:rec});}}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.text}}>{label}</div>
                  {entryN&&<div style={{fontSize:12,color:T.text2,marginTop:2}}>{entryN.cal} kcal</div>}
                </div>
                <button onClick={()=>rmFromSlot(key,ri)} style={{width:32,height:32,borderRadius:8,background:T.surface,border:`1px solid ${T.border2}`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:T.text2,flexShrink:0}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>;})}
          </div>}

// ── Pantry Tab ────────────────────────────────────────────────────────────────

        <div style={{width:26,height:26,borderRadius:8,border:'2px solid #ccc',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:'#fafafa'}}/>

        </div>

        <div style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.5px',marginTop:8,marginBottom:4,padding:'0 4px'}}>Comprados · añadidos a la alacena</div>
        {done.map(item=><div key={item.foodId} style={{display:'flex',alignItems:'center',gap:14,background:'#f5f5f0',borderRadius:14,border:'1px solid #e0e0e0',padding:'12px 16px',opacity:.6}}>
          <button onClick={()=>undoItem(item)} style={{width:26,height:26,borderRadius:8,background:'#1a3d0b',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><polyline points="20,6 9,17 4,12"/></svg>
          </button>
          <div style={{fontSize:14,textDecoration:'line-through',flex:1,color:'#666'}}>{item.food.name} — {item.missing} {item.food.unit}</div>
        </div>)}
      </>}
    </div>
    {isMobile&&<div style={{height:80}}/>}
  </div>;
}

// ── Recipe Form Sheet ─────────────────────────────────────────────────────────
function RecipeFormSheet({recipe,foods,onSave,close}){
  const [form,setForm]=useState(recipe?{...recipe}:{id:uid(),name:'',servings:1,prepTime:15,mealType:'Almuerzo',desc:'',ingredients:[],instructions:''});
  const fp=(k,v)=>setForm(f=>({...f,[k]:v}));
  const addIngr=()=>setForm(f=>({...f,ingredients:[...f.ingredients,{foodId:'',amount:'',unit:'g'}]}));
  const setIngr=(i,k,v)=>setForm(f=>{const a=[...f.ingredients];a[i]={...a[i],[k]:v};if(k==='foodId'){const food=foods.find(x=>x.id===v);if(food)a[i].unit=food.unit;}return{...f,ingredients:a};});
  const rmIngr=i=>setForm(f=>({...f,ingredients:f.ingredients.filter((_,j)=>j!==i)}));
  const save=()=>{if(!form.name)return;const ingrs=form.ingredients.filter(i=>i.foodId&&i.amount).map(i=>({...i,amount:+i.amount}));onSave({...form,servings:+form.servings,prepTime:+form.prepTime,ingredients:ingrs});close();};
  const preview=calcN(form.ingredients.filter(i=>i.foodId&&i.amount).map(i=>({...i,amount:+i.amount})),foods);
  return <Sheet open onClose={close} title={recipe?'Editar receta':'Nueva receta'} maxH="95vh">
    <div style={{padding:'4px 20px 16px'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:4}}>
        <LF t="Nombre"><input value={form.name} onChange={e=>fp('name',e.target.value)} placeholder="Nombre" style={{width:'100%',padding:'12px',fontSize:15,border:'1.5px solid #ddd',borderRadius:10,outline:'none',fontFamily:'inherit'}}/></LF>
        <LF t="Tipo"><select value={form.mealType} onChange={e=>fp('mealType',e.target.value)} style={{width:'100%',padding:'12px',fontSize:15,border:'1.5px solid #ddd',borderRadius:10,background:'#fff',outline:'none',fontFamily:'inherit'}}>{MEALS.map(m=><option key={m} value={m}>{m}</option>)}</select></LF>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:4}}>
        <LF t="Porciones"><input type="number" inputMode="numeric" value={form.servings} onChange={e=>fp('servings',e.target.value)} min="1" style={{width:'100%',padding:'12px',fontSize:15,border:'1.5px solid #ddd',borderRadius:10,outline:'none',fontFamily:'inherit'}}/></LF>
        <LF t="Tiempo (min)"><input type="number" inputMode="numeric" value={form.prepTime} onChange={e=>fp('prepTime',e.target.value)} min="0" style={{width:'100%',padding:'12px',fontSize:15,border:'1.5px solid #ddd',borderRadius:10,outline:'none',fontFamily:'inherit'}}/></LF>
      </div>
      <LF t="Descripción"><input value={form.desc} onChange={e=>fp('desc',e.target.value)} placeholder="Descripción breve" style={{width:'100%',padding:'12px',fontSize:15,border:'1.5px solid #ddd',borderRadius:10,outline:'none',fontFamily:'inherit'}}/></LF>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:'#666',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          Ingredientes
          <button onClick={addIngr} style={{padding:'6px 12px',borderRadius:8,border:'1px solid #ddd',background:'#f5f5f0',cursor:'pointer',fontSize:12,fontWeight:700}}>+ Añadir</button>
        </div>
        {form.ingredients.map((ingr,i)=><div key={i} style={{display:'grid',gridTemplateColumns:'1fr 80px 80px 40px',gap:8,marginBottom:10,alignItems:'center'}}>
          <select value={ingr.foodId} onChange={e=>setIngr(i,'foodId',e.target.value)} style={{padding:'11px 10px',fontSize:14,border:'1.5px solid #ddd',borderRadius:9,background:'#fff',outline:'none',fontFamily:'inherit'}}><option value="">Alimento...</option>{foods.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}</select>
          <input type="number" inputMode="decimal" value={ingr.amount} onChange={e=>setIngr(i,'amount',e.target.value)} placeholder="Cant." style={{padding:'11px 8px',fontSize:14,border:'1.5px solid #ddd',borderRadius:9,outline:'none',fontFamily:'inherit',textAlign:'center'}}/>
          <input value={ingr.unit} onChange={e=>setIngr(i,'unit',e.target.value)} placeholder="Unidad" style={{padding:'11px 8px',fontSize:14,border:'1.5px solid #ddd',borderRadius:9,outline:'none',fontFamily:'inherit'}}/>
          <button onClick={()=>rmIngr(i)} style={{height:44,borderRadius:9,border:'1px solid #fecaca',background:'#fee2e2',color:'#991b1b',cursor:'pointer',fontSize:16,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>)}
        {form.ingredients.length===0&&<div style={{fontSize:13,color:'#888',textAlign:'center',padding:'14px',background:'#f5f5f0',borderRadius:10}}>Sin ingredientes aún.</div>}
      </div>
      {form.ingredients.some(i=>i.foodId&&i.amount)&&<div style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:'#666',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Nutrición por porción (vista previa)</div>
        <NutrBar n={preview} servings={+form.servings||1} compact/>
      </div>}
      <LF t="Instrucciones"><textarea value={form.instructions} onChange={e=>fp('instructions',e.target.value)} placeholder="Pasos de preparación..." style={{width:'100%',padding:'12px',fontSize:14,border:'1.5px solid #ddd',borderRadius:10,background:'#fff',outline:'none',fontFamily:'inherit',resize:'vertical',minHeight:90,lineHeight:1.6}}/></LF>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:4}}>
        <button onClick={close} style={{padding:'14px',borderRadius:12,border:'1.5px solid #ddd',background:'#f5f5f0',cursor:'pointer',fontSize:14,fontWeight:600}}>Cancelar</button>
        <button onClick={save} style={{padding:'14px',borderRadius:12,border:'none',background:'#1a3d0b',color:'#fff',cursor:'pointer',fontSize:14,fontWeight:700}}>Guardar receta</button>
      </div>
    </div>
  </Sheet>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const isMobile=useIsMobile();
  const [appReady,setAppReady]=useState(!IS_CONFIGURED);
  const [syncStatus,setSyncStatus]=useState('idle');
  const [tab,setTab]=useState('planner');
  const [person,setPerson]=useState('jeff');
  const [weekOff,setWeekOff]=useState(0);
  const [foods,setFoods]=useState(FOODS0);
  const [recipes,setRecipes]=useState(RECIPES0);
  const [pantry,setPantry]=useState([]);
  const [planners,setPlanners]=useState({jeff:{},lia:{}});
  const [modal,setModal]=useState(null);
  const [shopChk,setShopChk]=useState({});
  const T=TH[person];
  const dates=useMemo(()=>weekDates(weekOff),[weekOff]);
  const saveTimer=useRef(null);
  const isFirst=useRef(true);

  useEffect(()=>{
    if(!IS_CONFIGURED)return;setSyncStatus('saving');
    dbLoad().then(data=>{if(data){if(data.foods)setFoods(data.foods);if(data.recipes)setRecipes(data.recipes);if(data.pantry)setPantry(data.pantry);if(data.planners)setPlanners(data.planners);if(data.shopChk)setShopChk(data.shopChk);}setAppReady(true);setSyncStatus('saved');setTimeout(()=>setSyncStatus('idle'),2000);}).catch(()=>{setAppReady(true);setSyncStatus('error');});
  },[]);

  useEffect(()=>{
    if(!IS_CONFIGURED||!appReady)return;if(isFirst.current){isFirst.current=false;return;}
    if(saveTimer.current)clearTimeout(saveTimer.current);setSyncStatus('saving');
    saveTimer.current=setTimeout(async()=>{try{await Promise.all([dbSave('foods',foods),dbSave('recipes',recipes),dbSave('pantry',pantry),dbSave('planners',planners),dbSave('shopChk',shopChk)]);setSyncStatus('saved');setTimeout(()=>setSyncStatus('idle'),2500);}catch{setSyncStatus('error');}},1200);
  },[foods,recipes,pantry,planners,shopChk]);

  useEffect(()=>{if(!IS_CONFIGURED)return;const iv=setInterval(async()=>{const d=await dbLoad();if(!d)return;if(d.planners)setPlanners(d.planners);if(d.pantry)setPantry(d.pantry);if(d.shopChk)setShopChk(d.shopChk);},45000);return()=>clearInterval(iv);},[]);

  const addToSlot=(key,entry)=>setPlanners(p=>({...p,[person]:{...p[person],[key]:[...(p[person][key]||[]),entry]}}));
  const rmFromSlot=(key,i)=>setPlanners(p=>{const a=[...(p[person][key]||[])];a.splice(i,1);return{...p,[person]:{...p[person],[key]:a}};});

  const shopList=useMemo(()=>{
    const needed={};const forPerson={};
    ['jeff','lia'].forEach(pid=>{Object.values(planners[pid]||{}).forEach(entries=>(entries||[]).forEach(entry=>{
      if(entry.type==='food'){needed[entry.foodId]=(needed[entry.foodId]||0)+entry.amount;if(!forPerson[entry.foodId])forPerson[entry.foodId]=new Set();forPerson[entry.foodId].add(pid);}
      else{const rec=recipes.find(r=>r.id===entry.rId);if(!rec)return;rec.ingredients.forEach(({foodId,amount})=>{needed[foodId]=(needed[foodId]||0)+(amount/rec.servings)*(entry.qty||1);if(!forPerson[foodId])forPerson[foodId]=new Set();forPerson[foodId].add(pid);});}
    }));});
    return Object.entries(needed).map(([fId,amt])=>{const f=foods.find(x=>x.id===fId);if(!f)return null;const have=pantry.find(p=>p.foodId===fId)?.amount||0;const missing=r1(Math.max(0,amt-have));if(missing<=0)return null;return{foodId:fId,food:f,needed:r1(amt),have,missing,forPersons:[...(forPerson[fId]||[])]};}).filter(Boolean);
  },[planners,pantry,recipes,foods]);

  const TABS=[{id:'planner',icon:'📅',label:'Plan'},{id:'recipes',icon:'📖',label:'Recetas'},{id:'foods',icon:'🥦',label:'Alimentos'},{id:'pantry',icon:'🏠',label:'Alacena'},{id:'shop',icon:'🛒',label:'Compras',badge:shopList.length}];

  if(!appReady)return<div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,background:'#f5f5f0'}}>
    <div style={{width:40,height:40,border:'3px solid #e0e0e0',borderTop:'3px solid #1a3d0b',borderRadius:'50%',animation:'spin .8s linear infinite'}}/>
    <div style={{fontSize:14,color:'#666'}}>Cargando datos…</div>
  </div>;

  const syncIndicator={idle:null,saving:<span style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#888'}}><span style={{width:6,height:6,borderRadius:'50%',background:'#f59e0b',display:'inline-block',animation:'pulse 1s infinite'}}/>Guardando</span>,saved:<span style={{fontSize:11,color:'#22c55e',fontWeight:700}}>✓ Guardado</span>,error:<span style={{fontSize:11,color:'#ef4444'}}>⚠ Error</span>}[syncStatus];

  const plannerBg=tab==='planner'?T.bg:'#f5f5f0';

  return <div style={{background:plannerBg,transition:'background .3s',fontFamily:"'Space Grotesk',sans-serif",minHeight:'100vh'}}>
    {/* ── Top header ── */}
    <div style={{position:'fixed',top:0,left:0,right:0,zIndex:50,height:52,background:'#fff',borderBottom:'1px solid #e0e0e0',display:'flex',alignItems:'center',paddingLeft:'calc(16px + var(--safe-l))',paddingRight:'calc(16px + var(--safe-r))'}}>
      <div style={{fontSize:16,fontWeight:800,color:'#1a3d0b',flex:1}}>🥗 Meal Planner</div>
      {/* Desktop tabs */}
      <div className="top-nav desktop-only" style={{gap:0,alignItems:'center',height:'100%'}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',alignItems:'center',gap:5,padding:'0 12px',height:'100%',border:'none',borderBottom:tab===t.id?'2.5px solid #1a3d0b':'2.5px solid transparent',background:'none',cursor:'pointer',fontSize:13,fontWeight:600,color:tab===t.id?'#1a3d0b':'#666',whiteSpace:'nowrap',position:'relative'}}>
          {t.icon} {t.label}{t.badge>0&&<span style={{background:'#DC2626',color:'#fff',fontSize:9,fontWeight:700,borderRadius:10,padding:'1px 5px'}}>{t.badge}</span>}
        </button>)}
      </div>
      {syncIndicator&&<div style={{marginLeft:12}}>{syncIndicator}</div>}
    </div>

    {/* ── Main content ── */}
    <div className="main-scroll" style={{maxWidth:1100,margin:'0 auto'}}>
      {/* Person switcher — planner tab only */}
      {tab==='planner'&&<div style={{position:'sticky',top:52,zIndex:20,background:T.surface,borderBottom:`1px solid ${T.border}`,padding:'10px 16px',display:'flex',gap:8,alignItems:'center',fontFamily:T.font}}>
        <span style={{fontSize:11,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.4px',flexShrink:0}}>Ver plan de</span>
        <div style={{display:'flex',gap:8,flex:1}}>
          {['jeff','lia'].map(pid=>{const th=TH[pid];const active=person===pid;return<button key={pid} onClick={()=>setPerson(pid)} className="tap-highlight" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'9px',borderRadius:14,border:`1.5px solid ${active?th.accent:T.border2}`,background:active?th.accentDark:'transparent',color:active?th.accentText:T.text2,cursor:'pointer',fontSize:14,fontWeight:700,fontFamily:th.font,transition:'all .15s'}}>
            <span style={{fontSize:18}}>{th.emoji}</span> {th.name}
          </button>;})}
        </div>
      </div>}

      {/* Tab content */}
      <div style={{background:tab==='planner'?T.bg:'#f5f5f0',minHeight:'calc(100vh - 52px)'}}>
        {tab==='planner'&&(isMobile
          ?<MobilePlannerTab dates={dates} weekOff={weekOff} setWeekOff={setWeekOff} planner={planners[person]} addToSlot={addToSlot} rmFromSlot={rmFromSlot} recipes={recipes} foods={foods} T={T} setModal={setModal}/>
          :<DesktopPlannerTab dates={dates} weekOff={weekOff} setWeekOff={setWeekOff} planner={planners[person]} addToSlot={addToSlot} rmFromSlot={rmFromSlot} recipes={recipes} foods={foods} T={T} setModal={setModal}/>
        )}
        {tab==='recipes'&&<RecipesTab recipes={recipes} setRecipes={setRecipes} foods={foods} pantry={pantry} setModal={setModal} isMobile={isMobile}/>}
        {tab==='foods'&&<FoodsTab foods={foods} setFoods={setFoods} isMobile={isMobile}/>}
        {tab==='pantry'&&<PantryTab pantry={pantry} setPantry={setPantry} foods={foods} isMobile={isMobile}/>}
        {tab==='shop'&&<ShopTab shopList={shopList} shopChk={shopChk} setShopChk={setShopChk} setPantry={setPantry} isMobile={isMobile}/>}
      </div>
    </div>

    {/* ── Mobile bottom nav ── */}
    <div className="bottom-nav mobile-only" style={{position:'fixed',bottom:0,left:0,right:0,zIndex:50,background:'#fff',borderTop:'1px solid #e0e0e0',display:'grid',gridTemplateColumns:'repeat(5,1fr)',paddingTop:8}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 2px 0',border:'none',background:'none',cursor:'pointer',position:'relative'}}>
        <div style={{fontSize:20,lineHeight:1}}>{t.icon}{t.badge>0&&<span style={{position:'absolute',top:-2,right:'50%',marginRight:-20,background:'#DC2626',color:'#fff',fontSize:8,fontWeight:700,borderRadius:8,padding:'1px 4px',minWidth:14,textAlign:'center'}}>{t.badge}</span>}</div>
        <div style={{fontSize:10,fontWeight:tab===t.id?700:500,color:tab===t.id?'#1a3d0b':'#888'}}>{t.label}</div>
        {tab===t.id&&<div style={{position:'absolute',top:-1,left:'50%',transform:'translateX(-50%)',width:24,height:3,borderRadius:2,background:'#1a3d0b'}}/>}
      </button>)}
    </div>

    {/* ── Mobile FAB ── */}
    {isMobile&&(tab==='recipes'||tab==='pantry'||tab==='foods')&&<button onClick={()=>{if(tab==='recipes')setModal({type:'recipeForm',recipe:null,onSave:r=>setRecipes(rs=>[...rs,r])});else if(tab==='pantry')document.dispatchEvent(new CustomEvent('pantry-add'));else if(tab==='foods')document.dispatchEvent(new CustomEvent('food-add'));}} className="tap-highlight" style={{position:'fixed',bottom:'calc(var(--nav-h) + var(--safe-bot) + 16px)',right:20,zIndex:40,width:56,height:56,borderRadius:'50%',background:'#1a3d0b',color:'#fff',border:'none',cursor:'pointer',fontSize:28,fontWeight:300,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 16px rgba(26,61,11,.35)'}}>+</button>}

    {/* ── Modals / Sheets ── */}
    {modal?.type==='addSlot'&&<AddSlotSheet date={modal.date} meal={modal.meal} recipes={recipes} foods={foods} pantry={pantry} addToSlot={addToSlot} T={T} close={()=>setModal(null)}/>}
    {modal?.type==='planRecipe'&&<PlanRecipeSheet recipe={modal.recipe} dates={dates} addToSlot={addToSlot} foods={foods} T={T} close={()=>setModal(null)}/>}
    {modal?.type==='detail'&&<DetailSheet recipe={modal.recipe} foods={foods} pantry={pantry} T={tab==='planner'?T:null} close={()=>setModal(null)} setModal={setModal}/>}
    {modal?.type==='recipeForm'&&<RecipeFormSheet recipe={modal.recipe} foods={foods} onSave={modal.onSave} close={()=>setModal(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
