<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'Space Grotesk',sans-serif;font-size:14px;}
input,select,textarea{font-family:inherit;font-size:16px!important;}
button{-webkit-appearance:none;appearance:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px;}

:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
  --nav-h:62px;
  --header-h:52px;
}

/* ── Animations ── */
@keyframes tabIn       { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes tabInFast   { from{opacity:0;transform:translateY(8px)}  to{opacity:1;transform:translateY(0)} }
@keyframes cardIn      { from{opacity:0;transform:translateY(18px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes slideUp     { from{transform:translateY(100%);opacity:.5} to{transform:translateY(0);opacity:1} }
@keyframes fadeIn      { from{opacity:0} to{opacity:1} }
@keyframes popIn       { from{transform:scale(.88);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes spin        { to{transform:rotate(360deg)} }
@keyframes pulse       { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes float       { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes bounce      { 0%,100%{transform:scale(1)} 30%{transform:scale(1.25)} 60%{transform:scale(.92)} }
@keyframes shimmer     { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes themeFlash  { 0%{opacity:0} 30%{opacity:.3} 100%{opacity:0} }
@keyframes slideRight  { from{transform:translateX(-16px);opacity:0} to{transform:translateX(0);opacity:1} }
@keyframes checkDraw   { from{stroke-dashoffset:40} to{stroke-dashoffset:0} }

.sheet-enter{animation:slideUp .3s cubic-bezier(.25,.72,.12,1) both;}
.fade-enter{animation:fadeIn .18s ease both;}
.pop-enter{animation:popIn .22s cubic-bezier(.3,.7,.2,1) both;}
.tab-enter{animation:tabIn .25s cubic-bezier(.2,.8,.2,1) both;}
.card-enter{animation:cardIn .3s cubic-bezier(.2,.8,.2,1) both;}
.slide-right-enter{animation:slideRight .22s ease both;}
.tap{transition:transform .1s,opacity .1s;}
.tap:active{transform:scale(.95);opacity:.8;}
.color-transition{transition:background .5s ease,border-color .4s ease,color .3s ease;}

.bottom-nav{
  padding-bottom:calc(var(--safe-bot) + 4px);
  height:calc(var(--nav-h) + var(--safe-bot));
}
.main-scroll{
  padding-top:var(--header-h);
  padding-bottom:calc(var(--nav-h) + var(--safe-bot) + 12px);
}

/* Theme card ring animation */
.theme-selected{animation:bounce .35s ease;}

/* Skeleton shimmer */
.skeleton{
  background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:8px;
}

@media(min-width:768px){
  .mobile-only{display:none!important;}
  .bottom-nav{display:none!important;}
  .main-scroll{padding-top:var(--header-h);padding-bottom:16px;}
  .top-tabs{display:flex!important;}
}
@media(max-width:767px){
  .desktop-only{display:none!important;}
  .top-tabs{display:none!important;}
  .mobile-only{display:flex!important;}
}
</style>

const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
const IS_CONFIGURED = SUPABASE_URL !== 'YOUR_SUPABASE_URL';
const db = IS_CONFIGURED ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
async function dbLoad(){if(!db)return null;try{const{data,error}=await db.from('app_state').select('key,value');if(error)throw error;return Object.fromEntries((data||[]).map(r=>[r.key,r.value]));}catch{return null;}}
async function dbSave(key,value){if(!db)return;try{await db.from('app_state').upsert({key,value,updated_at:new Date().toISOString()});}catch{}}
</script>

function SmBtn({children,onClick,v='ghost',style={}}){const s={primary:{background:'#1a3d0b',color:'#fff',border:'none'},danger:{background:'#fee2e2',color:'#991b1b',border:'1px solid #fecaca'},ghost:{background:'#f5f5f0',color:'#444',border:'1px solid #ddd'}};return <button onClick={onClick} className="tap" style={{padding:'8px 12px',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:600,display:'inline-flex',alignItems:'center',gap:4,...(s[v]||s.ghost),...style}}>{children}</button>;}
function LFld({t,T,children}){return <div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:T?T.text2:'#666',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>{t}</div>{children}</div>;}
function InpT({T,style={},...p}){return <input {...p} style={{width:'100%',padding:'13px 14px',fontSize:16,border:`1.5px solid ${T?T.border2:'#ddd'}`,borderRadius:10,background:T?T.surface2:'#fff',color:T?T.text:'#1a1a1a',outline:'none',fontFamily:'inherit',...style}}/>;}
function SelT({T,children,style={},...p}){return <select {...p} style={{width:'100%',padding:'13px 14px',fontSize:16,border:`1.5px solid ${T?T.border2:'#ddd'}`,borderRadius:10,background:T?T.surface2:'#fff',color:T?T.text:'#1a1a1a',outline:'none',fontFamily:'inherit',...style}}>{children}</select>;}

function slotLabel(entry,recipes,foods){
  if(entry.type==='food'){const f=foods.find(x=>x.id===entry.foodId);return f?`${f.name} (${entry.amount}${entry.unit})`:'?';}
  const rec=recipes.find(r=>r.id===entry.rId);if(!rec)return '?';
  return entry.qty&&entry.qty!==1?`${rec.name} ×${r1(entry.qty)}`:rec.name;
}
function slotCal(entry,recipes,foods){
  if(entry.type==='food'){const f=foods.find(x=>x.id===entry.foodId);if(!f)return 0;return r0(f.cal*(entry.amount/f.serving));}
  const rec=recipes.find(r=>r.id===entry.rId);if(!rec)return 0;return r0(calcN(rec.ingredients,foods,entry.qty||1).cal);
}

/* ── Sheet ── */
function Sheet({open,onClose,T,title,subtitle,children,maxH='92vh'}){
  const isMobile=useIsMobile();
  const sheetRef=useRef(null);
  const dragY=useRef(null);
  const [translateY,setTranslateY]=useState(0);

  const onHandleTouchStart=e=>{dragY.current=e.touches[0].clientY;setTranslateY(0);};
  const onHandleTouchMove=e=>{
    if(dragY.current===null)return;
    const dy=e.touches[0].clientY-dragY.current;
    if(dy>0)setTranslateY(dy);
  };
  const onHandleTouchEnd=e=>{
    const dy=e.changedTouches[0].clientY-(dragY.current||0);
    dragY.current=null;
    if(dy>80){setTranslateY(0);onClose();}
    else setTranslateY(0);
  };

  if(!open)return null;
  if(!isMobile)return(
    <div onClick={onClose} className="fade-enter" style={{position:'fixed',inset:0,zIndex:100,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'52px 16px 16px',overflowY:'auto'}}>
      <div onClick={e=>e.stopPropagation()} className="pop-enter" style={{background:T?T.surface:'#fff',borderRadius:16,border:`1px solid ${T?T.border:'#e0e0e0'}`,boxShadow:'0 24px 64px rgba(0,0,0,.22)',width:'100%',maxWidth:500,maxHeight:'85vh',overflowY:'auto',fontFamily:T?T.font:"'Space Grotesk',sans-serif"}}>
        {(title||subtitle||onClose)&&<div style={{padding:'18px 20px 14px',borderBottom:`1px solid ${T?T.border:'#e0e0e0'}`,display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8,background:T?T.surface:'#fff'}}>
          <div style={{flex:1}}><div style={{fontSize:16,fontWeight:700,color:T?T.text:'#1a1a1a'}}>{title}</div>{subtitle&&<div style={{fontSize:13,color:T?T.text2:'#666',marginTop:3}}>{subtitle}</div>}</div>
          <CloseBtn onClick={onClose} T={T}/>
        </div>}
        {children}
      </div>
    </div>
  );
  return(
    <div onClick={onClose} className="fade-enter" style={{position:'fixed',inset:0,zIndex:100,background:'rgba(0,0,0,.55)',display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
      <div ref={sheetRef} onClick={e=>e.stopPropagation()} className="sheet-enter" style={{background:T?T.surface:'#fff',borderRadius:'22px 22px 0 0',maxHeight:maxH,display:'flex',flexDirection:'column',paddingBottom:'calc(var(--safe-bot) + 8px)',fontFamily:T?T.font:"'Space Grotesk',sans-serif",transform:`translateY(${translateY}px)`,transition:translateY===0?'transform .25s cubic-bezier(.25,.72,.12,1)':' none'}}>
        {/* Drag handle — touch here to swipe down and close */}
        <div onTouchStart={onHandleTouchStart} onTouchMove={onHandleTouchMove} onTouchEnd={onHandleTouchEnd} style={{padding:'10px 0 6px',display:'flex',justifyContent:'center',flexShrink:0,cursor:'grab',touchAction:'none'}}>
          <div style={{width:42,height:4,borderRadius:2,background:T?T.border2:'#ddd',transition:'background .15s'}}/>
        </div>
        {(title||subtitle)&&<div onTouchStart={onHandleTouchStart} onTouchMove={onHandleTouchMove} onTouchEnd={onHandleTouchEnd} style={{padding:'4px 20px 14px',borderBottom:`1px solid ${T?T.border:'#f0f0f0'}`,flexShrink:0,display:'flex',alignItems:'flex-start',justifyContent:'space-between',touchAction:'none'}}>
          <div><div style={{fontSize:17,fontWeight:700,color:T?T.text:'#1a1a1a'}}>{title}</div>{subtitle&&<div style={{fontSize:13,color:T?T.text2:'#666',marginTop:3}}>{subtitle}</div>}</div>
          <CloseBtn onClick={onClose} T={T}/>
        </div>}
        <div style={{overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

/* ── QtyPicker ── */
function QtyPicker({recipe,foods,T,onConfirm,onBack}){
  const [mode,setMode]=useState('porciones');const [qty,setQty]=useState(1);const [exactAmt,setExactAmt]=useState('');const [exactUnit,setExactUnit]=useState('g');
  const rw=recipeWeight(recipe);const clamp=v=>Math.max(0.5,Math.round(v*2)/2);
  const effQty=mode==='porciones'?qty:(rw>0&&+exactAmt>0?(+exactAmt/rw)*recipe.servings:1);
  const baseN=calcN(recipe.ingredients,foods,1);
  const confirm=()=>{if(mode==='porciones')onConfirm(qty);else if(rw>0&&+exactAmt>0)onConfirm(r1((+exactAmt/rw)*recipe.servings));else onConfirm(1);};
  return <div style={{padding:'16px 20px 8px',background:T.surface}}>
    <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:2}}>{recipe.name}</div>
    <div style={{fontSize:13,color:T.text2,marginBottom:16}}>Define la cantidad</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:20}}>
      {[['porciones','Por porciones'],['exacto','En g / ml']].map(([m,lbl])=><button key={m} onClick={()=>setMode(m)} className="tap" style={{padding:'11px',borderRadius:10,border:`1.5px solid ${mode===m?T.accent:T.border}`,background:mode===m?T.accentDark:T.surface2,color:mode===m?T.accentText:T.text2,cursor:'pointer',fontSize:13,fontWeight:700}}>{lbl}</button>)}
    </div>
    {mode==='porciones'?<div style={{marginBottom:20}}>
      <div style={{fontSize:10,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:14}}>Porciones — base: {recipe.servings}</div>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <button onClick={()=>setQty(q=>clamp(q-.5))} className="tap" style={{width:52,height:52,borderRadius:14,border:`1.5px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',fontSize:24,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>−</button>
        <div style={{flex:1,textAlign:'center'}}><div style={{fontSize:42,fontWeight:800,color:T.accent,lineHeight:1}}>{qty}</div><div style={{fontSize:13,color:T.text2,marginTop:4}}>porción{qty!==1?'es':''}</div></div>
        <button onClick={()=>setQty(q=>q+.5)} className="tap" style={{width:52,height:52,borderRadius:14,border:`1.5px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',fontSize:24,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>+</button>
      </div>
    </div>:<div style={{marginBottom:20}}>
      {rw===0&&<div style={{background:'#FEF3C7',border:'1px solid #F59E0B',borderRadius:8,padding:'10px 12px',marginBottom:12,fontSize:13,color:'#92400E'}}>⚠ Sin ingredientes en g/ml. Usa porciones.</div>}
      <div style={{fontSize:10,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Peso total receta: {rw>0?rw+' g/ml':'no disponible'}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 90px',gap:10,marginBottom:10}}>
        <input type="number" inputMode="decimal" min="0" value={exactAmt} onChange={e=>setExactAmt(e.target.value)} placeholder={rw>0?String(r0(rw/recipe.servings)):'0'} style={{padding:'14px',fontSize:20,fontWeight:700,border:`1.5px solid ${T.border2}`,borderRadius:10,background:T.surface2,color:T.text,outline:'none',fontFamily:'inherit'}}/>
        <select value={exactUnit} onChange={e=>setExactUnit(e.target.value)} style={{padding:'14px',fontSize:16,border:`1.5px solid ${T.border2}`,borderRadius:10,background:T.surface2,color:T.text,outline:'none',fontFamily:'inherit'}}><option value="g">g</option><option value="ml">ml</option></select>
      </div>
      {+exactAmt>0&&rw>0&&<div style={{fontSize:13,color:T.text2}}>≈ {r1((+exactAmt/rw)*recipe.servings)} porciones</div>}
    </div>}
    <div style={{background:T.surface2,borderRadius:12,padding:'12px',marginBottom:16,border:`1px solid ${T.border}`}}>
      <div style={{fontSize:10,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>Nutrición total</div>
      <NutrBar n={baseN} servings={1/Math.max(0.01,effQty)} compact/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:10,paddingBottom:8}}>
      <GhostBtn onClick={onBack} T={T}>← Volver</GhostBtn>
      <PrimaryBtn onClick={confirm} T={T}>Confirmar</PrimaryBtn>
    </div>
  </div>;
}

/* ── FoodAmountPicker ── */
function FoodAmountPicker({food,T,onConfirm,onBack}){
  const [amount,setAmount]=useState(food.serving);
  const n=useMemo(()=>{if(!amount)return{cal:0,prot:0,carbs:0,fat:0,fiber:0};const r=amount/food.serving;return{cal:food.cal*r,prot:food.prot*r,carbs:food.carbs*r,fat:food.fat*r,fiber:food.fiber*r};},[amount,food]);
  return <div style={{padding:'16px 20px 8px',background:T.surface}}>
    <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:2}}>{food.name}</div>
    <div style={{fontSize:13,color:T.text2,marginBottom:20}}>¿Cuánto vas a consumir?</div>
    <div style={{fontSize:10,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:14}}>Cantidad ({food.unit})</div>
    <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20}}>
      <button onClick={()=>setAmount(a=>Math.max(0,a-food.serving))} className="tap" style={{width:52,height:52,borderRadius:14,border:`1.5px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',fontSize:24,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>−</button>
      <div style={{flex:1,position:'relative'}}>
        <input type="number" inputMode="decimal" min="0" value={amount} onChange={e=>setAmount(+e.target.value||0)} style={{width:'100%',padding:'14px 48px 14px 16px',fontSize:20,fontWeight:700,textAlign:'center',border:`1.5px solid ${T.border2}`,borderRadius:10,background:T.surface2,color:T.text,outline:'none',fontFamily:'inherit'}}/>
        <span style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',fontSize:13,color:T.text2,pointerEvents:'none'}}>{food.unit}</span>
      </div>
      <button onClick={()=>setAmount(a=>a+food.serving)} className="tap" style={{width:52,height:52,borderRadius:14,border:`1.5px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',fontSize:24,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>+</button>
    </div>
    {amount>0&&<div style={{background:T.surface2,borderRadius:12,padding:'12px',marginBottom:16,border:`1px solid ${T.border}`}}><div style={{fontSize:10,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>Nutrición</div><NutrBar n={n} compact/></div>}
    <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:10,paddingBottom:8}}>
      <GhostBtn onClick={onBack} T={T}>← Volver</GhostBtn>
      <PrimaryBtn onClick={()=>amount>0&&onConfirm({foodId:food.id,amount,unit:food.unit})} T={T} disabled={!amount}>Confirmar</PrimaryBtn>
    </div>
  </div>;
}

  const foodList=foods.filter(f=>f.name.toLowerCase().includes(q.toLowerCase()));

/* ── Mobile Planner ── */
function MobilePlannerTab({dates,weekOff,setWeekOff,planner,addToSlot,rmFromSlot,recipes,foods,T,setModal}){
  const todayIdx=Math.max(0,dates.findIndex(d=>isToday(d)));
  const [dayIdx,setDayIdx]=useState(todayIdx>=0?todayIdx:0);
  const date=dates[dayIdx];const fmt=d=>d.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});
  const touchStart=useRef(null);
  const onTS=e=>touchStart.current=e.touches[0].clientX;
  const onTE=e=>{if(touchStart.current===null)return;const dx=e.changedTouches[0].clientX-touchStart.current;if(Math.abs(dx)>48){if(dx<0)setDayIdx(i=>Math.min(6,i+1));else setDayIdx(i=>Math.max(0,i-1));}touchStart.current=null;};
  return <div style={{background:T.bg,minHeight:'100%',fontFamily:T.font}}>
    <div className="color-transition" style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:'12px 16px 10px',position:'sticky',top:52,zIndex:10}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
        <button onClick={()=>{setWeekOff(w=>w-1);setDayIdx(0);}} className="tap" style={{width:36,height:36,borderRadius:10,border:`1px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15,18 9,12 15,6"/></svg></button>
        <span style={{flex:1,textAlign:'center',fontSize:13,fontWeight:700,color:T.text}}>{weekOff===0?'Esta semana':weekOff>0?`+${weekOff} sem`:`${weekOff} sem`}</span>
        <button onClick={()=>{setWeekOff(w=>w+1);setDayIdx(0);}} className="tap" style={{width:36,height:36,borderRadius:10,border:`1px solid ${T.border2}`,background:T.surface2,color:T.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9,18 15,12 9,6"/></svg></button>
        {weekOff!==0&&<button onClick={()=>{setWeekOff(0);setDayIdx(todayIdx>=0?todayIdx:0);}} className="tap" style={{height:36,padding:'0 12px',borderRadius:10,border:`1px solid ${T.accent}`,background:'transparent',color:T.accent,cursor:'pointer',fontSize:12,fontWeight:700}}>Hoy</button>}
      </div>
      <div style={{display:'flex',gap:4,overflowX:'auto',paddingBottom:2}}>
        {dates.map((d,i)=>{const active=i===dayIdx;const tod=isToday(d);const hasAny=MEALS.some(m=>(planner[`${dKey(d)}_${m}`]||[]).length>0);
          return<button key={i} onClick={()=>setDayIdx(i)} className="tap" style={{flexShrink:0,width:44,padding:'7px 0',borderRadius:12,border:`1.5px solid ${active?T.accent:tod?T.border2:T.border}`,background:active?T.accentDark:T.surface2,color:active?T.accentText:T.text,cursor:'pointer',textAlign:'center',position:'relative',transition:'background .25s,border-color .25s'}}>
            <div style={{fontSize:9,color:active?T.accentText:T.text2,marginBottom:2}}>{DAYS_SHORT[i]}</div>
            <div style={{fontSize:15,fontWeight:700}}>{d.getDate()}</div>
            {hasAny&&<div style={{width:5,height:5,borderRadius:'50%',background:active?T.accentText:T.accent,margin:'2px auto 0'}}/>}
          </button>;})}
      </div>
    </div>
    <div onTouchStart={onTS} onTouchEnd={onTE} style={{padding:'0 0 8px'}}>
      <div style={{padding:'14px 16px 6px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:16,fontWeight:700,color:T.text,textTransform:'capitalize'}}>{fmt(date)}</div>
        {isToday(date)&&<span className="slide-right-enter" style={{fontSize:11,fontWeight:700,background:T.accentDark,color:T.accentText,padding:'3px 10px',borderRadius:8}}>Hoy</span>}
      </div>
      {MEALS.map((meal,mi)=>{const mc=T.meal[meal];const key=`${dKey(date)}_${meal}`;const slot=planner[key]||[];
        return<div key={meal} className="card-enter" style={{margin:'8px 16px',borderRadius:16,border:`1.5px solid ${T.border}`,overflow:'hidden',background:T.surface,animationDelay:`${mi*.07}s`}}>
          <div style={{padding:'12px 16px',background:mc.bg,borderBottom:`1px solid ${mc.bc}33`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:18}}>{MEAL_ICONS[meal]}</span>
              <div><div style={{fontSize:14,fontWeight:700,color:mc.tc}}>{meal}</div>{slot.length>0&&<div style={{fontSize:11,color:mc.tc,opacity:.8}}>{slot.length} ítem{slot.length>1?'s':''}</div>}</div>
            </div>
            <button onClick={()=>setModal({type:'addSlot',date,meal})} className="tap" style={{width:36,height:36,borderRadius:10,background:mc.bc+'33',border:`1px solid ${mc.bc}`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:mc.tc}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          </div>
          {slot.length===0?<div style={{padding:'18px 16px',textAlign:'center',color:T.text3,fontSize:13}}>Toca + para añadir</div>:
          <div style={{padding:'8px'}}>
            {slot.map((entry,ri)=><div key={ri} className="slide-right-enter" style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,background:T.surface2,border:`1px solid ${T.border}`,marginBottom:6,animationDelay:`${ri*.05}s`}}>
              <div style={{flex:1,cursor:entry.type==='recipe'?'pointer':'default'}} onClick={()=>{if(entry.type==='recipe'){const rec=recipes.find(r=>r.id===entry.rId);if(rec)setModal({type:'detail',recipe:rec});}}}>
                <div style={{fontSize:13,fontWeight:700,color:T.text}}>{slotLabel(entry,recipes,foods)}</div>
                <div style={{fontSize:12,color:T.text2,marginTop:2}}>{slotCal(entry,recipes,foods)} kcal</div>
              </div>
              <button onClick={()=>rmFromSlot(key,ri)} className="tap" style={{width:32,height:32,borderRadius:8,background:T.surface,border:`1px solid ${T.border2}`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:T.text2,flexShrink:0}}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>)}
          </div>}
        </div>;})}
      <div style={{textAlign:'center',padding:'8px 16px',color:T.text3,fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15,18 9,12 15,6"/></svg> desliza para cambiar de día <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9,18 15,12 9,6"/></svg>
      </div>
    </div>
  </div>;
}

        <div style={{display:'grid',gridTemplateColumns:'repeat(8,1fr)',gap:4}}>
          {EMOJIS.map(em=><button key={em} onClick={()=>fp('emoji',em)} className="tap" style={{padding:'8px 4px',borderRadius:8,border:`1.5px solid ${form.emoji===em?T.accent:T.border}`,background:form.emoji===em?T.accentDark:T.surface2,cursor:'pointer',fontSize:20,textAlign:'center',transition:'border-color .15s,background .15s'}}>
            {em}
          </button>)}

      </LFld>
      {/* Theme Picker */}
      <LFld t="Tema" T={T}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
          {Object.keys(TC).map(tid=><ThemeCard key={tid} themeId={tid} selected={form.themeId===tid} onSelect={tid=>fp('themeId',tid)}/>)}
        </div>
      </LFld>
      {/* Preview strip */}
      {form.themeId!==user.themeId&&<div style={{marginBottom:16,borderRadius:12,overflow:'hidden',border:`1px solid ${T.border}`}}>
        <div style={{background:TC[form.themeId].bg,padding:'10px 14px',display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:22}}>{form.emoji}</span>

/* ── Pantry Tab ── */

/* ── Shop Tab ── */
function ShopTab({shopList,shopChk,setShopChk,setPantry,users,isMobile}){
  const addToPantry=item=>{setPantry(p=>{const ex=p.find(x=>x.foodId===item.foodId);if(ex)return p.map(x=>x.foodId===item.foodId?{...x,amount:+(x.amount+item.missing).toFixed(1)}:x);return[...p,{foodId:item.foodId,amount:item.missing}];});setShopChk(c=>({...c,[item.foodId]:true}));};
  const undoItem=item=>{setPantry(p=>{const ex=p.find(x=>x.foodId===item.foodId);if(!ex)return p;const n=+(ex.amount-item.missing).toFixed(1);if(n<=0)return p.filter(x=>x.foodId!==item.foodId);return p.map(x=>x.foodId===item.foodId?{...x,amount:n}:x);});setShopChk(c=>({...c,[item.foodId]:false}));};
  const pending=shopList.filter(i=>!shopChk[i.foodId]);const done=shopList.filter(i=>shopChk[i.foodId]);
  const u0=users.jeff;const u1=users.lia;
  if(shopList.length===0)return<div style={{textAlign:'center',padding:'60px 20px',color:'#666'}}><div style={{fontSize:44,marginBottom:14,animation:'bounce .6s ease'}}>✅</div><div style={{fontSize:18,fontWeight:700}}>¡Todo listo!</div><div style={{fontSize:14,marginTop:6,color:'#888'}}>No faltan ingredientes.</div></div>;
  return<div style={{padding:isMobile?'14px':'16px'}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
      <div><div style={{fontSize:16,fontWeight:700}}>{pending.length} ítem{pending.length!==1?'s':''} pendiente{pending.length!==1?'s':''}</div><div style={{fontSize:13,color:'#666',marginTop:3}}>{u0.emoji} {u0.name} + {u1.emoji} {u1.name}</div></div>
      {pending.length>0&&<button onClick={()=>pending.forEach(i=>addToPantry(i))} className="tap" style={{padding:'10px 16px',borderRadius:10,border:'none',background:'#1a3d0b',color:'#fff',cursor:'pointer',fontSize:13,fontWeight:700}}>Marcar todo</button>}
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {pending.map((item,i)=><button key={item.foodId} onClick={()=>addToPantry(item)} className="tap card-enter" style={{display:'flex',alignItems:'center',gap:14,background:'#fff',borderRadius:14,border:'1.5px solid #e0e0e0',padding:'14px 16px',cursor:'pointer',textAlign:'left',width:'100%',animationDelay:`${Math.min(i,8)*.04}s`}}>
        <div style={{width:26,height:26,borderRadius:8,border:'2px solid #ccc',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:'#fafafa'}}/>
        <div style={{flex:1}}><div style={{fontSize:15,fontWeight:600,color:'#1a1a1a'}}>{item.food.name}</div><div style={{fontSize:12,color:'#888',marginTop:2}}>{item.forPersons&&item.forPersons.length>0&&<span style={{marginRight:6}}>{item.forPersons.map(p=>users[p]?.emoji||'').join(' ')}</span>}Tienes {item.have} {item.food.unit}</div></div>
        <span style={{fontSize:14,fontWeight:700,color:'#DC2626',flexShrink:0}}>+{item.missing} {item.food.unit}</span>
      </button>)}
      {done.length>0&&<>
        <div style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.5px',marginTop:8,marginBottom:4,padding:'0 4px'}}>Comprados · añadidos a alacena</div>
        {done.map(item=><div key={item.foodId} style={{display:'flex',alignItems:'center',gap:14,background:'#f5f5f0',borderRadius:14,border:'1px solid #e0e0e0',padding:'12px 16px',opacity:.6}}>
          <button onClick={()=>undoItem(item)} className="tap" style={{width:26,height:26,borderRadius:8,background:'#1a3d0b',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><polyline points="20,6 9,17 4,12"/></svg></button>
          <div style={{fontSize:14,textDecoration:'line-through',flex:1,color:'#666'}}>{item.food.name} — {item.missing} {item.food.unit}</div>
        </div>)}
      </>}
    </div>
    {isMobile&&<div style={{height:80}}/>}
  </div>;
}

/* ── Recipe Form Sheet ── */
function RecipeFormSheet({recipe,foods,onSave,close}){
  const [form,setForm]=useState(recipe?{...recipe}:{id:uid(),name:'',servings:1,prepTime:15,mealType:'Almuerzo',desc:'',ingredients:[],instructions:''});
  const fp=(k,v)=>setForm(f=>({...f,[k]:v}));
  const addIngr=()=>setForm(f=>({...f,ingredients:[...f.ingredients,{foodId:'',amount:'',unit:'g'}]}));
  const setIngr=(i,k,v)=>setForm(f=>{const a=[...f.ingredients];a[i]={...a[i],[k]:v};if(k==='foodId'){const food=foods.find(x=>x.id===v);if(food)a[i].unit=food.unit;}return{...f,ingredients:a};});
  const rmIngr=i=>setForm(f=>({...f,ingredients:f.ingredients.filter((_,j)=>j!==i)}));

        <LFld t="Porciones"><input type="number" inputMode="numeric" value={form.servings} onChange={e=>fp('servings',e.target.value)} min="1" style={{width:'100%',padding:'12px',fontSize:15,border:'1.5px solid #ddd',borderRadius:10,outline:'none',fontFamily:'inherit'}}/></LFld>
        <LFld t="Tiempo (min)"><input type="number" inputMode="numeric" value={form.prepTime} onChange={e=>fp('prepTime',e.target.value)} min="0" style={{width:'100%',padding:'12px',fontSize:15,border:'1.5px solid #ddd',borderRadius:10,outline:'none',fontFamily:'inherit'}}/></LFld>

      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:'#666',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>Ingredientes<button onClick={addIngr} className="tap" style={{padding:'6px 12px',borderRadius:8,border:'1px solid #ddd',background:'#f5f5f0',cursor:'pointer',fontSize:12,fontWeight:700}}>+ Añadir</button></div>

      {form.ingredients.some(i=>i.foodId&&i.amount)&&<div style={{marginBottom:14}}><div style={{fontSize:11,fontWeight:700,color:'#666',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Nutrición por porción (preview)</div><NutrBar n={preview} servings={+form.servings||1} compact/></div>}
      <LFld t="Instrucciones"><textarea value={form.instructions} onChange={e=>fp('instructions',e.target.value)} placeholder="Pasos de preparación..." style={{width:'100%',padding:'12px',fontSize:14,border:'1.5px solid #ddd',borderRadius:10,background:'#fff',outline:'none',fontFamily:'inherit',resize:'vertical',minHeight:90,lineHeight:1.6}}/></LFld>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:4}}>
        <button onClick={close} className="tap" style={{padding:'14px',borderRadius:12,border:'1.5px solid #ddd',background:'#f5f5f0',cursor:'pointer',fontSize:14,fontWeight:600}}>Cancelar</button>
        <button onClick={save} className="tap" style={{padding:'14px',borderRadius:12,border:'none',background:'#1a3d0b',color:'#fff',cursor:'pointer',fontSize:14,fontWeight:700}}>Guardar receta</button>
      </div>
    </div>
  </Sheet>;
}

/* ── App ── */
function App(){
  const isMobile=useIsMobile();
  const [appReady,setAppReady]=useState(!IS_CONFIGURED);
  const [syncStatus,setSyncStatus]=useState('idle');
  const [tab,setTab]=useState('planner');
  const [tabKey,setTabKey]=useState(0);
  const [person,setPerson]=useState('jeff');
  const [weekOff,setWeekOff]=useState(0);
  const [foods,setFoods]=useState(FOODS0);
  const [recipes,setRecipes]=useState(RECIPES0);
  const [pantry,setPantry]=useState([]);
  const [planners,setPlanners]=useState({jeff:{},lia:{}});
  const [modal,setModal]=useState(null);
  const [shopChk,setShopChk]=useState({});
  const [users,setUsers]=useState({jeff:{name:'Jeff',emoji:'🌑',themeId:'dark'},lia:{name:'Lia',emoji:'🌸',themeId:'pink'}});
  const saveTimer=useRef(null);const isFirst=useRef(true);

  const getT=pid=>{const u=users[pid]||users.jeff;return{...TC[u.themeId]||TC.dark,displayName:u.name,emoji:u.emoji};};
  const T=getT(person);
  const dates=useMemo(()=>weekDates(weekOff),[weekOff]);

  useEffect(()=>{
    if(!IS_CONFIGURED)return;setSyncStatus('saving');
    dbLoad().then(data=>{if(data){if(data.foods)setFoods(data.foods);if(data.recipes)setRecipes(data.recipes);if(data.pantry)setPantry(data.pantry);if(data.planners)setPlanners(data.planners);if(data.shopChk)setShopChk(data.shopChk);if(data.users)setUsers(data.users);}setAppReady(true);setSyncStatus('saved');setTimeout(()=>setSyncStatus('idle'),2000);}).catch(()=>{setAppReady(true);setSyncStatus('error');});
  },[]);

  useEffect(()=>{
    if(!IS_CONFIGURED||!appReady)return;if(isFirst.current){isFirst.current=false;return;}
    if(saveTimer.current)clearTimeout(saveTimer.current);setSyncStatus('saving');
    saveTimer.current=setTimeout(async()=>{try{await Promise.all([dbSave('foods',foods),dbSave('recipes',recipes),dbSave('pantry',pantry),dbSave('planners',planners),dbSave('shopChk',shopChk),dbSave('users',users)]);setSyncStatus('saved');setTimeout(()=>setSyncStatus('idle'),2500);}catch{setSyncStatus('error');}},1200);
  },[foods,recipes,pantry,planners,shopChk,users]);

  useEffect(()=>{if(!IS_CONFIGURED)return;const iv=setInterval(async()=>{const d=await dbLoad();if(!d)return;if(d.planners)setPlanners(d.planners);if(d.pantry)setPantry(d.pantry);if(d.shopChk)setShopChk(d.shopChk);if(d.users)setUsers(d.users);},45000);return()=>clearInterval(iv);},[]);

  const switchTab=t=>{setTab(t);setTabKey(k=>k+1);};
  const addToSlot=(key,entry)=>setPlanners(p=>({...p,[person]:{...p[person],[key]:[...(p[person][key]||[]),entry]}}));
  const rmFromSlot=(key,i)=>setPlanners(p=>{const a=[...(p[person][key]||[])];a.splice(i,1);return{...p,[person]:{...p[person],[key]:a}};});

  const shopList=useMemo(()=>{
    const needed={};const forPerson={};
    ['jeff','lia'].forEach(pid=>{Object.values(planners[pid]||{}).forEach(entries=>(entries||[]).forEach(entry=>{
      if(entry.type==='food'){needed[entry.foodId]=(needed[entry.foodId]||0)+entry.amount;if(!forPerson[entry.foodId])forPerson[entry.foodId]=new Set();forPerson[entry.foodId].add(pid);}
      else{const rec=recipes.find(r=>r.id===entry.rId);if(!rec)return;rec.ingredients.forEach(({foodId,amount})=>{needed[foodId]=(needed[foodId]||0)+(amount/rec.servings)*(entry.qty||1);if(!forPerson[foodId])forPerson[foodId]=new Set();forPerson[foodId].add(pid);});}
    }));});
    return Object.entries(needed).map(([fId,amt])=>{const f=foods.find(x=>x.id===fId);if(!f)return null;const have=pantry.find(p=>p.foodId===fId)?.amount||0;const missing=r1(Math.max(0,amt-have));if(missing<=0)return null;return{foodId:fId,food:f,needed:r1(amt),have,missing,forPersons:[...(forPerson[fId]||[])]};}).filter(Boolean);
  },[planners,pantry,recipes,foods]);

  const TABS=[{id:'planner',icon:'📅',label:'Plan'},{id:'recipes',icon:'📖',label:'Recetas'},{id:'foods',icon:'🥦',label:'Foods'},{id:'pantry',icon:'🏠',label:'Alacena'},{id:'shop',icon:'🛒',label:'Compras',badge:shopList.length},{id:'settings',icon:'⚙️',label:'Config'}];

  if(!appReady)return<div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,background:'#f5f5f0'}}>
    <div style={{width:40,height:40,border:'3px solid #e0e0e0',borderTop:'3px solid #1a3d0b',borderRadius:'50%',animation:'spin .8s linear infinite'}}/>
    <div style={{fontSize:14,color:'#666'}}>Cargando datos…</div>
  </div>;

  const syncDot={idle:null,saving:<span style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#888'}}><span style={{width:6,height:6,borderRadius:'50%',background:'#f59e0b',display:'inline-block',animation:'pulse 1s infinite'}}/>Guardando</span>,saved:<span style={{fontSize:11,color:'#22c55e',fontWeight:700}}>✓ Guardado</span>,error:<span style={{fontSize:11,color:'#ef4444'}}>⚠ Error</span>}[syncStatus];
  const plannerBg=tab==='planner'?T.bg:'#f5f5f0';

  return<div style={{background:plannerBg,transition:'background .5s ease',fontFamily:"'Space Grotesk',sans-serif",minHeight:'100vh'}}>
    <div style={{maxWidth:1100,margin:'0 auto'}}>
      {/* Header */}
      <div style={{position:'fixed',top:0,left:0,right:0,zIndex:50,height:52,background:'#fff',borderBottom:'1px solid #e0e0e0',display:'flex',alignItems:'center',paddingLeft:'calc(14px + var(--safe-l))',paddingRight:'calc(14px + var(--safe-r))'}}>
        <div style={{fontSize:16,fontWeight:800,color:'#1a3d0b',flex:1}}>🥗 Meal Planner</div>
        <div className="top-tabs desktop-only" style={{gap:0,alignItems:'center',height:'100%'}}>
          {TABS.map(t=><button key={t.id} onClick={()=>switchTab(t.id)} className="tap" style={{display:'flex',alignItems:'center',gap:5,padding:'0 11px',height:'100%',border:'none',borderBottom:tab===t.id?'2.5px solid #1a3d0b':'2.5px solid transparent',background:'none',cursor:'pointer',fontSize:13,fontWeight:600,color:tab===t.id?'#1a3d0b':'#666',whiteSpace:'nowrap',transition:'color .2s'}}>
            {t.icon} {t.label}{t.badge>0&&<span style={{background:'#DC2626',color:'#fff',fontSize:9,fontWeight:700,borderRadius:10,padding:'1px 5px'}}>{t.badge}</span>}
          </button>)}
        </div>
        {syncDot&&<div style={{marginLeft:10}}>{syncDot}</div>}
      </div>

      <div className="main-scroll">
        {/* Person switcher */}
        {tab==='planner'&&<div className="color-transition" style={{position:'sticky',top:52,zIndex:20,background:T.surface,borderBottom:`1px solid ${T.border}`,padding:'10px 16px',display:'flex',gap:8,alignItems:'center',fontFamily:T.font}}>
          <span style={{fontSize:10,fontWeight:700,color:T.text2,textTransform:'uppercase',letterSpacing:'.4px',flexShrink:0}}>Plan de</span>
          {['jeff','lia'].map(pid=>{const th=getT(pid);const u=users[pid];const active=person===pid;return<button key={pid} onClick={()=>setPerson(pid)} className="tap" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'9px',borderRadius:14,border:`1.5px solid ${active?th.accent:T.border2}`,background:active?th.accentDark:'transparent',color:active?th.accentText:T.text2,cursor:'pointer',fontSize:14,fontWeight:700,fontFamily:th.font,transition:'all .25s'}}>
            <span style={{fontSize:18}}>{u.emoji}</span>{u.name}
          </button>;})}
        </div>}

        {/* Tab content */}
        <div key={tabKey} className="tab-enter" style={{background:plannerBg,minHeight:'calc(100vh - 52px)',transition:'background .5s'}}>
          {tab==='planner'&&(isMobile
            ?<MobilePlannerTab dates={dates} weekOff={weekOff} setWeekOff={setWeekOff} planner={planners[person]} addToSlot={addToSlot} rmFromSlot={rmFromSlot} recipes={recipes} foods={foods} T={T} setModal={setModal}/>
            :<DesktopPlannerTab dates={dates} weekOff={weekOff} setWeekOff={setWeekOff} planner={planners[person]} addToSlot={addToSlot} rmFromSlot={rmFromSlot} recipes={recipes} foods={foods} T={T} setModal={setModal}/>
          )}
          {tab==='recipes'&&<RecipesTab recipes={recipes} setRecipes={setRecipes} foods={foods} pantry={pantry} setModal={setModal} isMobile={isMobile}/>}
          {tab==='foods'&&<FoodsTab foods={foods} setFoods={setFoods} isMobile={isMobile}/>}
          {tab==='pantry'&&<PantryTab pantry={pantry} setPantry={setPantry} foods={foods} isMobile={isMobile}/>}
          {tab==='shop'&&<ShopTab shopList={shopList} shopChk={shopChk} setShopChk={setShopChk} setPantry={setPantry} users={users} isMobile={isMobile}/>}
          {tab==='settings'&&<SettingsTab users={users} setUsers={setUsers} isMobile={isMobile}/>}
        </div>
      </div>

      {/* Mobile bottom nav */}
      <div className="bottom-nav color-transition" style={{position:'fixed',bottom:0,left:0,right:0,zIndex:50,background:'#fff',borderTop:'1px solid #e0e0e0',display:'grid',gridTemplateColumns:'repeat(6,1fr)',paddingTop:8}}>
        {TABS.map(t=><button key={t.id} onClick={()=>switchTab(t.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'3px 1px 0',border:'none',background:'none',cursor:'pointer',position:'relative'}}>
          <div style={{fontSize:18,lineHeight:1,position:'relative'}}>{t.icon}{t.badge>0&&<span style={{position:'absolute',top:-3,right:-8,background:'#DC2626',color:'#fff',fontSize:8,fontWeight:700,borderRadius:8,padding:'1px 4px',minWidth:14,textAlign:'center'}}>{t.badge}</span>}</div>
          <div style={{fontSize:9,fontWeight:tab===t.id?700:500,color:tab===t.id?'#1a3d0b':'#888',transition:'color .2s'}}>{t.label}</div>
          {tab===t.id&&<div style={{position:'absolute',top:-1,left:'50%',transform:'translateX(-50%)',width:20,height:3,borderRadius:2,background:'#1a3d0b',animation:'popIn .2s ease'}}/>}
        </button>)}
      </div>

      {/* FAB */}
      {isMobile&&(tab==='recipes'||tab==='pantry'||tab==='foods')&&<button onClick={()=>{if(tab==='recipes')setModal({type:'recipeForm',recipe:null,onSave:r=>setRecipes(rs=>[...rs,r])});}} className="tap" style={{position:'fixed',bottom:'calc(var(--nav-h) + var(--safe-bot) + 14px)',right:18,zIndex:40,width:56,height:56,borderRadius:'50%',background:'#1a3d0b',color:'#fff',border:'none',cursor:'pointer',fontSize:28,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 20px rgba(26,61,11,.4)',animation:'float 3s ease-in-out infinite'}}>+</button>}
    </div>

    {/* Modals */}
    {modal?.type==='addSlot'&&<AddSlotSheet date={modal.date} meal={modal.meal} recipes={recipes} foods={foods} pantry={pantry} addToSlot={addToSlot} T={T} close={()=>setModal(null)}/>}
    {modal?.type==='planRecipe'&&<PlanRecipeSheet recipe={modal.recipe} dates={dates} addToSlot={addToSlot} foods={foods} T={T} close={()=>setModal(null)}/>}
    {modal?.type==='detail'&&<DetailSheet recipe={modal.recipe} foods={foods} pantry={pantry} T={tab==='planner'?T:null} close={()=>setModal(null)} setModal={setModal}/>}
    {modal?.type==='recipeForm'&&<RecipeFormSheet recipe={modal.recipe} foods={foods} onSave={modal.onSave} close={()=>setModal(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
